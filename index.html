<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Movienes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0e0e0e; --topbar:#111; --text:#f0f0f0; --text-muted:#888;
  --accent:#e63946; --accent2:#457b9d; --border:#2a2a2a;
  --shadow:0 4px 24px rgba(0,0,0,.6); --shadow-lg:0 12px 48px rgba(0,0,0,.8);
  --rail-w:160px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);height:100vh;overflow:hidden;}

/* TOPBAR */
#topbar{position:fixed;top:0;left:0;right:0;z-index:1000;background:var(--topbar);border-bottom:2px solid var(--accent);display:flex;flex-direction:column;}
#topbar-main{display:flex;align-items:center;gap:10px;padding:0 16px;height:52px;white-space:nowrap;overflow:hidden;}
#topbar h1{font-family:'Bebas Neue',sans-serif;font-size:26px;color:#fff;letter-spacing:3px;flex-shrink:0;}
#topbar-controls{display:flex;align-items:center;gap:8px;flex-wrap:nowrap;overflow:hidden;flex:1;}
#topbar-menu-btn{display:none;background:none;border:none;color:#aaa;font-size:20px;cursor:pointer;padding:4px 6px;margin-left:auto;flex-shrink:0;}
#topbar-drawer{display:none;flex-direction:column;gap:8px;background:var(--topbar);padding:10px 16px 14px;border-top:1px solid #222;}
#topbar-drawer.open{display:flex;}
.drawer-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
#topbar label{color:#aaa;font-size:12px;flex-shrink:0;}
#zoom-slider{-webkit-appearance:none;width:90px;height:4px;border-radius:2px;background:#333;outline:none;cursor:pointer;flex-shrink:0;}
#zoom-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer;}
#zoom-val{color:#aaa;font-size:11px;min-width:34px;flex-shrink:0;}
.topbar-key-btn{background:#1e1e1e;border:1px solid #444;color:#ccc;font-size:11px;padding:5px 10px;border-radius:4px;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:5px;transition:background .15s;flex-shrink:0;}
.topbar-key-btn:hover{background:#2a2a2a;}
.topbar-key-btn .dot{width:7px;height:7px;border-radius:50%;background:#444;flex-shrink:0;}
.topbar-key-btn.has-key .dot{background:#4caf50;}
.topbar-btn{background:var(--accent);color:#fff;border:none;padding:6px 12px;border-radius:4px;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:600;cursor:pointer;flex-shrink:0;transition:background .2s;}
.topbar-btn:hover{background:#c1121f;}
.topbar-btn.secondary{background:#1e1e1e;border:1px solid #444;}
.topbar-btn.secondary:hover{background:#2a2a2a;}
/* Search */
#title-search-wrap{position:relative;flex-shrink:0;}
#title-search{background:#1e1e1e;border:1px solid #444;color:#fff;font-size:11px;padding:5px 10px 5px 28px;border-radius:4px;width:160px;font-family:'DM Sans',sans-serif;outline:none;}
#title-search::placeholder{color:#555;}
#title-search:focus{border-color:#888;}
#ts-icon{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:#555;pointer-events:none;display:flex;}
#ts-clear{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:none;border:none;color:#555;cursor:pointer;font-size:14px;display:none;line-height:1;padding:0;}
#ts-clear.on{display:block;}

@media(max-width:900px){#topbar-controls{display:none;}#topbar-menu-btn{display:block;}}
@media(min-width:901px){#topbar-drawer{display:none !important;}}

/* FILTER BAR */
#filter-bar{position:fixed;top:52px;left:0;right:0;z-index:999;background:#111;border-bottom:1px solid #1e1e1e;padding:6px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;min-height:40px;}
.filter-group{display:flex;align-items:center;gap:5px;}
.filter-chip{background:#1e1e1e;color:#777;border:1px solid #2a2a2a;padding:3px 10px;border-radius:20px;font-size:11px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s;white-space:nowrap;}
.filter-chip:hover{background:#2a2a2a;color:#ddd;}
.filter-chip.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.filter-toggle-btn{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s;border:1.5px solid #2a2a2a;background:#1e1e1e;color:#555;flex-shrink:0;}
.filter-toggle-btn.on{border-color:#4caf50;color:#4caf50;background:#0d1a0d;}
.filter-toggle-btn:hover{border-color:#555;color:#ccc;}
.filter-clear{background:#1e1e1e;color:var(--accent);border:1.5px solid var(--accent);padding:3px 12px;border-radius:20px;font-size:11px;font-family:'DM Sans',sans-serif;font-weight:700;cursor:pointer;transition:all .15s;margin-left:auto;white-space:nowrap;}
.filter-clear:hover{background:#2a0a0a;}
/* Count pills */
.count-group{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.count-group span{color:#555;font-size:11px;}
.count-pill{background:#1e1e1e;color:#555;border:1px solid #2a2a2a;padding:3px 9px;border-radius:20px;font-size:11px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s;}
.count-pill:hover{color:#ddd;background:#2a2a2a;}
.count-pill.active{color:var(--accent);border-color:var(--accent);}

/* STAGE */
#stage{position:fixed;top:92px;left:0;right:0;bottom:0;overflow:hidden;display:flex;align-items:stretch;}

/* FEATURED */
#featured{flex:1;position:relative;overflow:hidden;background:#000;}
#featured-poster{position:absolute;inset:0;background-size:cover;background-position:center top;background-repeat:no-repeat;transition:opacity .35s ease;}
#featured-poster.fade{opacity:0;}
#featured-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.95) 0%,rgba(0,0,0,.6) 35%,rgba(0,0,0,.12) 65%,transparent 100%);pointer-events:none;}
/* watched overlay on featured (search mode only) */
#watched-overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;pointer-events:none;z-index:5;}
#watched-overlay.on{display:flex;}
#watched-tick{font-size:clamp(80px,16vw,200px);color:#4caf50;text-shadow:0 4px 32px rgba(76,175,80,.5);line-height:1;animation:tickIn .22s ease;}
@keyframes tickIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
/* bottom info */
#featured-info{position:absolute;left:0;right:0;bottom:0;padding:clamp(16px,3vw,44px) clamp(16px,4vw,52px);z-index:6;}
#featured-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(26px,5.5vw,68px);line-height:1;letter-spacing:2px;color:#fff;text-shadow:0 2px 16px rgba(0,0,0,.8);margin-bottom:5px;}
#featured-year-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;flex-wrap:wrap;}
.year-badge{font-size:12px;font-weight:600;color:#aaa;}
.tmdb-badge{font-size:11px;font-weight:700;background:rgba(1,180,228,.18);color:#01b4e4;border:1px solid rgba(1,180,228,.35);padding:2px 8px;border-radius:4px;display:inline-flex;align-items:center;gap:4px;}
#featured-platforms{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.plat-pill{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.09);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.14);border-radius:5px;padding:3px 9px;font-size:11px;font-weight:600;color:#ddd;}
.plat-pill img{width:15px;height:15px;object-fit:contain;border-radius:2px;}
#featured-actions{display:flex;align-items:center;gap:10px;}
.action-btn{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.09);backdrop-filter:blur(8px);border:1.5px solid rgba(255,255,255,.18);color:#fff;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;padding:8px 18px;border-radius:8px;cursor:pointer;transition:background .15s,border-color .15s;-webkit-tap-highlight-color:transparent;}
.action-btn:hover{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.38);}
.action-btn svg{flex-shrink:0;}
.action-btn.is-watched{border-color:#4caf50;color:#4caf50;}
.action-btn.is-watched:hover{background:rgba(76,175,80,.18);}
/* nav arrows */
#nav-prev,#nav-next{position:absolute;top:50%;transform:translateY(-50%);z-index:10;background:rgba(0,0,0,.42);backdrop-filter:blur(6px);border:1.5px solid rgba(255,255,255,.1);color:#fff;width:40px;height:60px;border-radius:8px;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,opacity .2s;-webkit-tap-highlight-color:transparent;}
#nav-prev{left:14px;}
#nav-next{right:calc(var(--rail-w) + 14px);}
#nav-prev:hover,#nav-next:hover{background:rgba(230,57,70,.42);border-color:var(--accent);}
.nav-hidden{opacity:0 !important;pointer-events:none !important;}

/* THUMB RAIL */
#thumb-rail{width:var(--rail-w);background:rgba(0,0,0,.68);backdrop-filter:blur(12px);border-left:1px solid #1a1a1a;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
#thumb-scroll{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:thin;scrollbar-color:#222 transparent;}
#thumb-scroll::-webkit-scrollbar{width:3px;}
#thumb-scroll::-webkit-scrollbar-thumb{background:#222;border-radius:2px;}
.thumb-item{position:relative;cursor:pointer;border-bottom:1px solid #0a0a0a;transition:background .1s;-webkit-tap-highlight-color:transparent;user-select:none;}
.thumb-item:hover{background:rgba(255,255,255,.05);}
.thumb-item.active{background:rgba(230,57,70,.1);border-left:3px solid var(--accent);}
.thumb-item img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;}
.thumb-no-img{width:100%;aspect-ratio:2/3;background:#0e0e0e;display:flex;align-items:center;justify-content:center;padding:6px;}
.thumb-no-img span{font-size:9px;color:#333;text-align:center;word-break:break-word;line-height:1.3;}
.thumb-label{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.88));padding:14px 6px 4px;font-size:9px;font-weight:600;color:#bbb;line-height:1.2;}
.thumb-watched-layer{position:absolute;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;}
.thumb-watch-tick{font-size:clamp(20px,3vw,36px);color:#4caf50;text-shadow:0 2px 10px rgba(76,175,80,.5);}
.thumb-rating{position:absolute;top:4px;left:4px;background:rgba(0,0,0,.72);color:#f5c518;border-radius:3px;padding:1px 5px;font-size:9px;font-weight:700;pointer-events:none;}

/* EMPTY STATE */
#empty-state{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;text-align:center;z-index:4;}
#empty-state.on{display:flex;}
#empty-state svg{opacity:.18;}
#empty-state h3{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:#3a3a3a;}
#empty-state p{font-size:13px;color:#3a3a3a;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:3000;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal-box{background:#161616;border-radius:12px;padding:24px;width:100%;max-width:480px;box-shadow:var(--shadow-lg);animation:modalIn .18s ease;position:relative;border:1px solid #2a2a2a;}
@keyframes modalIn{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
.modal-box h2{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;margin-bottom:14px;color:#fff;}
.modal-close-x{position:absolute;top:14px;right:16px;background:none;border:none;font-size:20px;color:#555;cursor:pointer;}
.modal-close-x:hover{color:#fff;}
.modal-input{width:100%;border:1.5px solid #2a2a2a;border-radius:6px;padding:9px 12px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;background:#0e0e0e;color:#fff;}
.modal-input:focus{border-color:var(--accent2);}
.modal-actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end;}
.btn-primary{background:var(--accent);color:#fff;border:none;padding:8px 20px;border-radius:6px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:700;cursor:pointer;}
.btn-primary:hover{background:#c1121f;}
.btn-secondary{background:#1e1e1e;color:#ddd;border:1px solid #333;padding:8px 20px;border-radius:6px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:700;cursor:pointer;}
.btn-secondary:hover{background:#2a2a2a;}
.btn-cancel{background:none;border:1.5px solid #2a2a2a;color:#888;padding:8px 16px;border-radius:6px;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;}
.btn-cancel:hover{background:#1a1a1a;}
/* confirm dialog */
.confirm-inner{text-align:center;padding:4px 0;}
.confirm-subtitle{font-size:14px;color:#777;margin-bottom:6px;}
.confirm-film-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;color:#fff;margin-bottom:18px;}
/* key steps */
.key-steps{margin-bottom:16px;display:flex;flex-direction:column;}
.key-step{font-size:12px;color:#bbb;line-height:1.6;display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid #1e1e1e;text-align:left;}
.key-step:last-child{border-bottom:none;}
.key-step-num{background:var(--accent);color:#fff;border-radius:50%;width:20px;height:20px;min-width:20px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:2px;}
.key-step-body{flex:1;}
.key-step a{color:var(--accent2);}
.key-visible{font-family:monospace;font-size:12px;}
/* info modal */
.info-inner{display:flex;gap:16px;}
.info-poster{width:100px;min-width:100px;height:150px;object-fit:cover;border-radius:8px;background:#111;display:block;}
.info-body{flex:1;min-width:0;}
.info-badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.info-badge{font-size:10px;font-weight:700;letter-spacing:.4px;padding:2px 7px;border-radius:3px;}
.info-badge.year{background:#1a1a1a;color:#888;border:1px solid #2a2a2a;}
.info-badge.tmdb{background:rgba(1,180,228,.12);color:#01b4e4;border:1px solid rgba(1,180,228,.28);}
.info-badge.genre{background:#1a1a1a;color:#777;border:1px solid #222;}
.info-providers{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.info-plat{display:inline-flex;align-items:center;gap:4px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:5px;padding:3px 8px;font-size:11px;color:#bbb;}
.info-plat img{width:14px;height:14px;object-fit:contain;border-radius:2px;}
.info-synopsis{font-size:12px;color:#777;line-height:1.6;max-height:120px;overflow-y:auto;}

/* SPINNER */
.spinner{display:inline-block;width:16px;height:16px;border:2px solid #2a2a2a;border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* LOADING */
#loading-screen{position:fixed;inset:0;z-index:5000;background:#0e0e0e;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
#loading-screen h2{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:4px;color:var(--accent);}
#loading-screen p{color:#444;font-size:13px;}
#loading-progress{width:200px;height:3px;background:#1a1a1a;border-radius:2px;overflow:hidden;margin-top:4px;}
#loading-bar{width:0%;height:100%;background:var(--accent);border-radius:2px;transition:width .3s;}

/* TOAST */
.toast-msg{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#1e1e1e;color:#ddd;padding:8px 20px;border-radius:20px;font-size:13px;z-index:9999;transition:opacity .4s;font-family:'DM Sans',sans-serif;white-space:nowrap;border:1px solid #2a2a2a;}

/* TV ZOOM */
#tv-zoom{position:fixed;top:70px;right:calc(var(--rail-w) + 12px);display:none;flex-direction:column;gap:6px;z-index:2000;}
.tv-zoom-btn{width:44px;height:44px;background:rgba(0,0,0,.7);border:2px solid #444;border-radius:10px;color:#fff;font-size:26px;font-weight:300;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.tv-zoom-btn:focus{background:var(--accent);border-color:var(--accent);outline:none;}
.tizen-detected *{transition:none !important;}
.tizen-detected #filter-bar{flex-wrap:nowrap !important;overflow-x:auto !important;}

/* RESPONSIVE */
@media(max-width:600px){
  #topbar-main{height:48px !important;padding:0 10px !important;}
  #topbar h1{font-size:18px;}
  #topbar-controls{display:none !important;}
  #topbar-menu-btn{display:flex !important;margin-left:auto;}
  #topbar-drawer{position:fixed;top:48px;left:0;right:0;z-index:999;max-height:70vh;overflow-y:auto;}
  #filter-bar{top:48px !important;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;gap:5px;padding:6px 10px;scrollbar-width:none;}
  #filter-bar::-webkit-scrollbar{display:none;}
  :root{--rail-w:90px;}
  #nav-next{right:calc(90px + 8px);}
  .thumb-label{font-size:8px;}
  #featured-title{font-size:clamp(20px,7vw,38px);}
  .action-btn{font-size:11px;padding:6px 12px;gap:5px;}
  .modal-overlay{padding:0;align-items:flex-end;}
  .modal-box{border-radius:16px 16px 0 0 !important;max-width:100% !important;width:100% !important;max-height:85vh !important;overflow-y:auto !important;padding:24px 20px 32px;}
  .modal-box::before{content:'';display:block;width:40px;height:4px;background:#2a2a2a;border-radius:2px;margin:0 auto 16px;}
  .info-inner{flex-direction:column;}
  .info-poster{width:80px;min-width:80px;height:120px;}
}
@media(hover:none) and (pointer:coarse){
  #filter-bar{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;gap:6px;padding:8px 12px;scrollbar-width:none;}
  #filter-bar::-webkit-scrollbar{display:none;}
  .filter-chip,.count-pill{padding:5px 14px;font-size:12px;}
}
button{-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:3px;}
</style>
</head>
<body>

<!-- TOPBAR -->
<div id="topbar">
  <div id="topbar-main">
    <h1>🎬 Movienes</h1>
    <div id="topbar-controls">
      <button class="topbar-key-btn" id="tmdb-btn" onclick="openKeyModal()">
        <span class="dot" id="tmdb-dot"></span> TMDB
      </button>
      <label>Zoom:</label>
      <input type="range" id="zoom-slider" min="80" max="240" value="160" step="10" oninput="onZoomChange(this.value)">
      <span id="zoom-val">160px</span>
      <button class="topbar-btn secondary" onclick="reloadAll()" title="Recargar">↻</button>
      <div id="title-search-wrap">
        <span id="ts-icon">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
        </span>
        <input id="title-search" type="text" placeholder="Buscar título…"
          oninput="onTitleSearch(this.value)"
          onfocus="this.style.borderColor='#888'" onblur="this.style.borderColor='#444'">
        <button id="ts-clear" onclick="clearTitleSearch()" title="Limpiar">✕</button>
      </div>
    </div>
    <button id="topbar-menu-btn" onclick="toggleDrawer()">☰</button>
  </div>
  <div id="topbar-drawer">
    <div class="drawer-row" style="justify-content:space-between;padding:4px 0 8px">
      <span style="font-family:'Bebas Neue',sans-serif;font-size:16px;color:#fff;letter-spacing:1px">Config</span>
      <button onclick="toggleDrawer()" style="background:none;border:none;color:#aaa;font-size:18px;cursor:pointer">✕</button>
    </div>
    <div class="drawer-row">
      <button class="topbar-key-btn" onclick="openKeyModal()"><span class="dot" id="tmdb-dot2"></span> TMDB</button>
      <button class="topbar-btn secondary" onclick="reloadAll();toggleDrawer()">↻ Reload</button>
    </div>
    <div class="drawer-row" style="align-items:center">
      <label style="color:#aaa;font-size:12px">Zoom:</label>
      <input type="range" id="zoom-slider2" min="80" max="240" value="160" step="10" style="flex:1" oninput="onZoomChange(this.value)">
      <span id="zoom-val2" style="color:#aaa;font-size:11px;min-width:40px">160px</span>
    </div>
    <div class="drawer-row">
      <input id="title-search-drawer" type="text" placeholder="Buscar título…"
        style="flex:1;background:#1e1e1e;border:1px solid #444;color:#fff;font-size:12px;padding:8px 10px;border-radius:4px;font-family:'DM Sans',sans-serif;outline:none;"
        oninput="onTitleSearch(this.value)">
    </div>
  </div>
</div>

<!-- FILTER BAR -->
<div id="filter-bar"></div>

<!-- STAGE -->
<div id="stage">
  <div id="featured">
    <div id="featured-poster"></div>
    <div id="featured-overlay"></div>
    <div id="watched-overlay"><div id="watched-tick">✓</div></div>
    <button id="nav-prev" class="nav-hidden" onclick="navigate(-1)">‹</button>
    <button id="nav-next" class="nav-hidden" onclick="navigate(1)">›</button>
    <div id="featured-info">
      <div id="featured-title"></div>
      <div id="featured-year-row"></div>
      <div id="featured-platforms"></div>
      <div id="featured-actions"></div>
    </div>
    <div id="empty-state">
      <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 2l-4 5-4-5"/></svg>
      <h3>Sin resultados</h3>
      <p id="empty-msg">Añade tu API Key de TMDB para empezar</p>
    </div>
  </div>
  <div id="thumb-rail">
    <div id="thumb-scroll"></div>
  </div>
</div>

<div id="tv-zoom">
  <button class="tv-zoom-btn" onclick="changeRailZoom(1)">+</button>
  <button class="tv-zoom-btn" onclick="changeRailZoom(-1)">−</button>
</div>
<div id="modal-container"></div>
<div id="loading-screen">
  <h2>Movienes</h2>
  <div class="spinner"></div>
  <p id="loading-text">Cargando…</p>
  <div id="loading-progress"><div id="loading-bar"></div></div>
</div>

<script>
// ═══════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════
const TMDB_BASE='https://api.themoviedb.org/3';
const IMG185='https://image.tmdb.org/t/p/w185';
const IMG500='https://image.tmdb.org/t/p/w500';

const PROVIDER_MAP={
  8:  {id:'netflix', name:'Netflix',    logo:'/t2yyOv40HZeVlLjYsCsPHnWLk4W.jpg'},
  119:{id:'prime',   name:'Prime',      logo:'/dQeAar5H991VYporEjUspolDarG.jpg'},
  9:  {id:'prime',   name:'Prime',      logo:'/dQeAar5H991VYporEjUspolDarG.jpg'},
  337:{id:'disney',  name:'Disney+',    logo:'/7rwgEs15tFwyR9NPQ5vpzxTj19Q.jpg'},
  384:{id:'max',     name:'Max',        logo:'/Ajqyt5aNxNvaG0maqS5YpZA7GR2.jpg'},
  350:{id:'apple',   name:'Apple TV+',  logo:'/peURlLlr8jggOwK53fJ5wdQl05y.jpg'},
  2:  {id:'apple',   name:'Apple TV+',  logo:'/peURlLlr8jggOwK53fJ5wdQl05y.jpg'},
  1773:{id:'sky',    name:'SkyShowtime',logo:'/dUFUaFPkDEarjJNFRGJuX2dGD0m.jpg'},
  149:{id:'mplus',   name:'Movistar+',  logo:'/iNRmKLo5YSBOdUOtECaYfjeUBqL.jpg'},
  567:{id:'mplus',   name:'Movistar+',  logo:'/iNRmKLo5YSBOdUOtECaYfjeUBqL.jpg'},
  63: {id:'filmin',  name:'Filmin',     logo:'/2Me8rEfFKYMCGzjz4pjePRo6bqR.jpg'},
  1985:{id:'atres',  name:'Atresplayer',logo:'/hFkiWuBbPLiI2MWKDM2dRvRrFCR.jpg'},
  62: {id:'mubi',    name:'MUBI',       logo:'/bVR4Z1LCHY7gidXAQF3Q5SZYEIq.jpg'},
  2239:{id:'rtve',   name:'RTVE Play',  logo:'/pq8p1umEnFCdV9hEUCYQxE5UCGR.jpg'},
  541:{id:'rtve',    name:'RTVE Play',  logo:'/pq8p1umEnFCdV9hEUCYQxE5UCGR.jpg'},
};
function pLogo(p){return 'https://image.tmdb.org/t/p/w45'+p.logo;}
const PICKER_PLATFORMS=Object.values(
  Object.values(PROVIDER_MAP).reduce((acc,p)=>{acc[p.id]={...p,logoUrl:pLogo(p)};return acc;},{})
);
const GENRE_MAP={
  28:'Acción',12:'Aventura',16:'Animación',35:'Comedia',80:'Crimen',
  99:'Documental',18:'Drama',10751:'Familia',14:'Fantasía',36:'Historia',
  27:'Terror',10402:'Música',9648:'Misterio',10749:'Romance',878:'Sci-Fi',
  53:'Thriller',10752:'Bélica',37:'Western'
};

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let allMovies=[];
let displayList=[];
let currentIdx=0;
let maxCount=20;
let activeGenre=null;
let activeProvider=null;
let showPlatforms=true;
let showRatings=true;
let searchQuery='';
let watchedSet=new Set(JSON.parse(localStorage.getItem('movienes_watched')||'[]'));
let railZoom=160;
let _loadingAbort=false;

// ═══════════════════════════════════════════════
// KEYS
// ═══════════════════════════════════════════════
function getKey(){return localStorage.getItem('movienes_tmdb_key')||'';}
function setKey(v){localStorage.setItem('movienes_tmdb_key',v);updateDots();}
function updateDots(){
  const has=!!getKey();
  document.getElementById('tmdb-btn')?.classList.toggle('has-key',has);
  ['tmdb-dot','tmdb-dot2'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.style.background=has?'#4caf50':'#444';
  });
}

// ═══════════════════════════════════════════════
// LAYOUT
// ═══════════════════════════════════════════════
function adjustLayout(){
  const tbH=document.getElementById('topbar')?.getBoundingClientRect().height||52;
  const fb=document.getElementById('filter-bar');
  if(fb) fb.style.top=tbH+'px';
  setTimeout(()=>{
    const fbH=fb?.getBoundingClientRect().height||40;
    const stage=document.getElementById('stage');
    if(stage) stage.style.top=(tbH+fbH)+'px';
  },20);
}
function toggleDrawer(){document.getElementById('topbar-drawer').classList.toggle('open');adjustLayout();}
window.addEventListener('resize',adjustLayout);

// ═══════════════════════════════════════════════
// ZOOM
// ═══════════════════════════════════════════════
function onZoomChange(v){
  v=parseInt(v);railZoom=v;
  ['zoom-val','zoom-val2'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=v+'px';});
  ['zoom-slider','zoom-slider2'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=v;});
  const rail=document.getElementById('thumb-rail');
  if(rail) rail.style.width=v+'px';
  document.documentElement.style.setProperty('--rail-w',v+'px');
  const nn=document.getElementById('nav-next');
  if(nn) nn.style.right=(v+14)+'px';
  localStorage.setItem('movienes_rail_zoom',v);
}
function changeRailZoom(dir){onZoomChange(Math.max(80,Math.min(240,railZoom+dir*20)));}

// ═══════════════════════════════════════════════
// TITLE SEARCH
// ═══════════════════════════════════════════════
let _searchDb;
function onTitleSearch(val){
  document.getElementById('title-search').value=val;
  const d=document.getElementById('title-search-drawer');if(d)d.value=val;
  const clr=document.getElementById('ts-clear');if(clr)clr.className=val?'on':'';
  clearTimeout(_searchDb);
  _searchDb=setTimeout(()=>{
    searchQuery=val.toLowerCase().trim();
    buildDisplayList();
    currentIdx=0;
    renderAll();
  },200);
}
function clearTitleSearch(){document.getElementById('title-search').value='';onTitleSearch('');}

// ═══════════════════════════════════════════════
// TMDB API
// ═══════════════════════════════════════════════
async function tmdbGet(path){
  const key=getKey();if(!key) return null;
  const sep=path.includes('?')?'&':'?';
  try{
    const ctrl=new AbortController();setTimeout(()=>ctrl.abort(),8000);
    const r=await fetch(`${TMDB_BASE}${path}${sep}api_key=${key}`,{signal:ctrl.signal});
    if(!r.ok) return null;
    return await r.json();
  }catch{return null;}
}

async function fetchPage(page,genreId,byRating){
  const sort=byRating?'vote_average.desc':'release_date.desc';
  const voteMin=byRating?'&vote_count.gte=80':'';
  const gp=genreId?`&with_genres=${genreId}`:'';
  const pp=activeProvider?`&with_watch_providers=${getProvId(activeProvider)}`:'';
  const d=await tmdbGet(`/discover/movie?language=es-ES&region=ES&sort_by=${sort}${voteMin}&watch_region=ES&with_watch_monetization_types=flatrate&include_adult=false&page=${page}${gp}${pp}`);
  return (d?.results||[]).filter(x=>x.poster_path);
}
function getProvId(pid){
  const e=Object.entries(PROVIDER_MAP).find(([,v])=>v.id===pid);
  return e?e[0]:null;
}

async function fetchProviders(tmdbId){
  const d=await tmdbGet(`/movie/${tmdbId}/watch/providers`);
  if(!d) return [];
  const region=d.results?.ES||{};
  const out=[],seen=new Set();
  (region.flatrate||[]).forEach(p=>{
    if(/channel|addon|with ads/i.test(p.provider_name)) return;
    const mapped=PROVIDER_MAP[p.provider_id];
    const pid=mapped?.id||('p'+p.provider_id);
    if(seen.has(pid)) return;
    seen.add(pid);
    const logo=p.logo_path?'https://image.tmdb.org/t/p/w45'+p.logo_path:(mapped?pLogo(mapped):'');
    out.push({id:pid,name:mapped?.name||p.provider_name,logo});
  });
  return out;
}

async function fetchDetails(tmdbId){
  return await tmdbGet(`/movie/${tmdbId}?language=es-ES`);
}

// ═══════════════════════════════════════════════
// LOAD
// ═══════════════════════════════════════════════
async function loadMovies(){
  if(!getKey()){setLoading(false);showEmpty(true,'Añade tu API Key de TMDB para empezar');return;}
  _loadingAbort=false;
  allMovies=[];displayList=[];
  setLoading(true,'Cargando películas…');setLoadingBar(0);
  const genreId=activeGenre?Object.entries(GENRE_MAP).find(([,v])=>v===activeGenre)?.[0]:null;
  const byRating=!!activeGenre;

  let page=1,collected=[];
  while(collected.length<maxCount&&page<=6){
    if(_loadingAbort) return;
    setLoadingBar(Math.round(collected.length/maxCount*60));
    setLoadingText(`Página ${page}…`);
    const batch=await fetchPage(page,genreId,byRating);
    if(!batch.length) break;
    collected=[...collected,...batch];
    page++;
  }
  allMovies=collected.slice(0,maxCount);
  setLoadingBar(65);
  if(!allMovies.length){setLoading(false);showEmpty(true,'Sin resultados para este filtro');return;}

  // Enrich first 12 with providers
  setLoadingText('Cargando plataformas…');
  const bsz=Math.min(12,allMovies.length);
  await Promise.all(allMovies.slice(0,bsz).map(async(m,i)=>{
    if(_loadingAbort) return;
    m._providers=await fetchProviders(m.id);
    if(i%4===0) setLoadingBar(65+Math.round(i/bsz*32));
  }));
  setLoadingBar(100);

  setTimeout(()=>{
    setLoading(false);
    buildDisplayList();
    currentIdx=0;
    renderAll();
    // Background: load rest of providers
    (async()=>{
      for(let i=bsz;i<allMovies.length;i++){
        if(_loadingAbort) return;
        allMovies[i]._providers=await fetchProviders(allMovies[i].id);
        if(i===currentIdx) renderFeatured();
        // Partial thumb refresh every 5
        if(i%5===4) renderThumbs();
      }
      renderThumbs();
    })();
  },180);
}

async function reloadAll(){
  _loadingAbort=true;
  await new Promise(r=>setTimeout(r,80));
  _loadingAbort=false;
  loadMovies();
}

// ═══════════════════════════════════════════════
// DISPLAY LIST
// ═══════════════════════════════════════════════
function buildDisplayList(){
  if(searchQuery){
    const q=searchQuery;
    const matched=allMovies.filter(m=>(m.title||'').toLowerCase().includes(q));
    // In search: show all (watched + unwatched), watched go to the end
    const unwatched=matched.filter(m=>!watchedSet.has(String(m.id)));
    const watched=matched.filter(m=>watchedSet.has(String(m.id)));
    displayList=[...unwatched,...watched];
  } else {
    // Normal: hide watched
    displayList=allMovies.filter(m=>!watchedSet.has(String(m.id)));
  }
}

// ═══════════════════════════════════════════════
// FILTER BAR
// ═══════════════════════════════════════════════
function renderFilterBar(){
  setTimeout(adjustLayout,40);
  const bar=document.getElementById('filter-bar');
  if(!bar) return;
  const genres=Object.values(GENRE_MAP).sort();
  const starSvg=`<svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`;
  const eyeSvg=`<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
  bar.innerHTML=`
    <div class="count-group">
      <span>Títulos:</span>
      ${[20,40,60,100].map(n=>`<button class="count-pill${maxCount===n?' active':''}" onclick="setCount(${n},this)">${n}</button>`).join('')}
    </div>
    <button class="filter-toggle-btn ${showPlatforms?'on':'off'}" onclick="toggleShowPlatforms()">${eyeSvg} Plataformas</button>
    <button class="filter-toggle-btn ${showRatings?'on':'off'}" onclick="toggleShowRatings()">${starSvg} Nota</button>
    <div class="filter-group">
      ${PICKER_PLATFORMS.map(p=>`<button class="filter-chip${activeProvider===p.id?' active':''}" onclick="toggleProvider('${p.id}')">${escHtml(p.name)}</button>`).join('')}
    </div>
    <div class="filter-group">
      ${genres.map(g=>`<button class="filter-chip${activeGenre===g?' active':''}" onclick="toggleGenre('${escHtml(g)}')">${escHtml(g)}</button>`).join('')}
    </div>
    ${(activeGenre||activeProvider)?`<button class="filter-clear" onclick="clearFilters()">✕ Limpiar</button>`:''}
  `;
}

function setCount(n,btn){
  maxCount=n;
  document.querySelectorAll('.count-pill').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  loadMovies();
}
function toggleGenre(g){activeGenre=activeGenre===g?null:g;renderFilterBar();loadMovies();}
function toggleProvider(pid){activeProvider=activeProvider===pid?null:pid;renderFilterBar();loadMovies();}
function clearFilters(){activeGenre=null;activeProvider=null;renderFilterBar();loadMovies();}
function toggleShowPlatforms(){showPlatforms=!showPlatforms;renderFilterBar();renderFeatured();}
function toggleShowRatings(){showRatings=!showRatings;renderFilterBar();renderFeatured();renderThumbs();}

// ═══════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════
function navigate(dir){
  if(!displayList.length) return;
  currentIdx=Math.max(0,Math.min(displayList.length-1,currentIdx+dir));
  renderFeatured();
  scrollThumbToActive();
  enrichCurrent();
}
function goToIndex(idx){
  currentIdx=Math.max(0,Math.min(displayList.length-1,idx));
  renderFeatured();
  scrollThumbToActive();
  enrichCurrent();
}

document.addEventListener('keydown',e=>{
  if(e.target.matches('input,textarea')) return;
  if(e.key==='ArrowDown'||e.key==='ArrowRight') navigate(1);
  if(e.key==='ArrowUp'||e.key==='ArrowLeft') navigate(-1);
  if(e.key==='Enter') openInfoModal();
});

let _ty=0,_tx=0;
document.getElementById('featured').addEventListener('touchstart',e=>{_ty=e.touches[0].clientY;_tx=e.touches[0].clientX;},{passive:true});
document.getElementById('featured').addEventListener('touchend',e=>{
  const dy=_ty-e.changedTouches[0].clientY,dx=_tx-e.changedTouches[0].clientX;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>40) navigate(dx>0?1:-1);
  else if(Math.abs(dy)>Math.abs(dx)&&Math.abs(dy)>40) navigate(dy>0?1:-1);
},{passive:true});

// ═══════════════════════════════════════════════
// WATCHED
// ═══════════════════════════════════════════════
function confirmWatched(){
  const m=displayList[currentIdx];if(!m) return;
  const isWatched=watchedSet.has(String(m.id));

  if(isWatched){
    // Unmark directly (no confirm needed)
    watchedSet.delete(String(m.id));
    localStorage.setItem('movienes_watched',JSON.stringify([...watchedSet]));
    buildDisplayList();
    currentIdx=Math.min(currentIdx,Math.max(0,displayList.length-1));
    if(!displayList.length){showEmpty(true,'Sin más películas');renderThumbs();return;}
    renderAll();
    return;
  }

  // Mark as watched — confirm dialog
  showModal(`
    <button class="modal-close-x" onclick="closeModal()">✕</button>
    <div class="confirm-inner">
      <div class="confirm-subtitle">¿Vista?</div>
      <div class="confirm-film-title">${escHtml(m.title||'')}</div>
      <div class="modal-actions" style="justify-content:center">
        <button class="btn-secondary" onclick="closeModal()">No</button>
        <button class="btn-primary" onclick="doMarkWatched()">Sí, vista</button>
      </div>
    </div>`);
}

function doMarkWatched(){
  const m=displayList[currentIdx];if(!m){closeModal();return;}
  watchedSet.add(String(m.id));
  localStorage.setItem('movienes_watched',JSON.stringify([...watchedSet]));
  closeModal();
  buildDisplayList();
  currentIdx=Math.min(currentIdx,Math.max(0,displayList.length-1));
  if(!displayList.length){showEmpty(true,'Sin más películas sin ver');renderThumbs();return;}
  renderAll();
  showToast('Marcada como vista ✓');
}

// ═══════════════════════════════════════════════
// LAZY ENRICH
// ═══════════════════════════════════════════════
async function enrichCurrent(){
  const m=displayList[currentIdx];if(!m||m._enriched) return;
  m._enriched=true;
  if(!m._providers) m._providers=await fetchProviders(m.id);
  if(!m._overview){
    const d=await fetchDetails(m.id);
    if(d){m._overview=d.overview;m._runtime=d.runtime;}
  }
  renderFeatured();
}

// ═══════════════════════════════════════════════
// RENDER FEATURED
// ═══════════════════════════════════════════════
let _lastId=null;
function renderFeatured(){
  const m=displayList[currentIdx];
  const emptyEl=document.getElementById('empty-state');
  if(!m){
    emptyEl?.classList.add('on');
    ['featured-title','featured-year-row','featured-platforms','featured-actions'].forEach(id=>{const el=document.getElementById(id);if(el)el.innerHTML='';});
    document.getElementById('featured-poster').style.backgroundImage='';
    document.getElementById('watched-overlay').classList.remove('on');
    document.getElementById('nav-prev').classList.add('nav-hidden');
    document.getElementById('nav-next').classList.add('nav-hidden');
    return;
  }
  emptyEl?.classList.remove('on');

  const isWatched=watchedSet.has(String(m.id));
  const inSearch=!!searchQuery;
  const year=(m.release_date||'').slice(0,4);
  const rating=m.vote_average?Math.round(m.vote_average*10)/10:null;

  // Poster crossfade
  const poster=document.getElementById('featured-poster');
  if(_lastId!==m.id){
    _lastId=m.id;
    if(m.poster_path){
      const img=new Image();
      img.onload=()=>{
        poster.classList.add('fade');
        requestAnimationFrame(()=>{
          poster.style.backgroundImage=`url(${IMG500}${m.poster_path})`;
          requestAnimationFrame(()=>poster.classList.remove('fade'));
        });
      };
      img.src=IMG500+m.poster_path;
    } else {
      poster.style.backgroundImage='';
    }
  }

  // Watched overlay — only in search mode
  document.getElementById('watched-overlay').classList.toggle('on',inSearch&&isWatched);

  // Title
  document.getElementById('featured-title').textContent=m.title||'—';

  // Year + rating
  let yr=`<span class="year-badge">${year}</span>`;
  if(showRatings&&rating) yr+=`<span class="tmdb-badge"><svg width="10" height="10" viewBox="0 0 24 24" fill="#f5c518" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg> ${rating}</span>`;
  document.getElementById('featured-year-row').innerHTML=yr;

  // Platforms
  const platEl=document.getElementById('featured-platforms');
  if(showPlatforms&&(m._providers||[]).length){
    platEl.innerHTML=(m._providers).map(p=>`<span class="plat-pill">${p.logo?`<img src="${p.logo}" alt="" loading="lazy">`:''}${escHtml(p.name)}</span>`).join('');
    platEl.style.display='';
  } else {
    platEl.innerHTML='';
    platEl.style.display='none';
  }

  // Nav arrows
  document.getElementById('nav-prev').classList.toggle('nav-hidden',currentIdx<=0);
  document.getElementById('nav-next').classList.toggle('nav-hidden',currentIdx>=displayList.length-1);

  // Actions
  const tickSvg=`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
  const infoSvg=`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="8" stroke-width="3"/><line x1="12" y1="11" x2="12" y2="16"/></svg>`;
  document.getElementById('featured-actions').innerHTML=`
    <button class="action-btn" onclick="openInfoModal()">${infoSvg} Info</button>
    <button class="action-btn${isWatched?' is-watched':''}" onclick="confirmWatched()">${tickSvg} ${isWatched?'Vista ✓':'Vista'}</button>`;
}

// ═══════════════════════════════════════════════
// RENDER THUMBS
// ═══════════════════════════════════════════════
function renderThumbs(){
  const rail=document.getElementById('thumb-scroll');
  if(!displayList.length){rail.innerHTML='';return;}
  const inSearch=!!searchQuery;
  rail.innerHTML=displayList.map((m,i)=>{
    const isWatched=watchedSet.has(String(m.id));
    const isActive=i===currentIdx;
    const rating=showRatings&&m.vote_average?Math.round(m.vote_average*10)/10:null;
    const poster=m.poster_path?IMG185+m.poster_path:'';
    return `<div class="thumb-item${isActive?' active':''}" onclick="goToIndex(${i})">
      ${poster
        ?`<img src="${poster}" alt="${escHtml(m.title||'')}" loading="lazy">`
        :`<div class="thumb-no-img"><span>${escHtml(m.title||'')}</span></div>`}
      <div class="thumb-label">${escHtml(m.title||'')}</div>
      ${isWatched&&inSearch?`<div class="thumb-watched-layer"><div class="thumb-watch-tick">✓</div></div>`:''}
      ${rating?`<div class="thumb-rating">★ ${rating}</div>`:''}
    </div>`;
  }).join('');
}

function scrollThumbToActive(){
  const rail=document.getElementById('thumb-scroll');
  rail.querySelector('.thumb-item.active')?.scrollIntoView({block:'nearest',behavior:'smooth'});
}

function renderAll(){renderFeatured();renderThumbs();}

// ═══════════════════════════════════════════════
// INFO MODAL
// ═══════════════════════════════════════════════
async function openInfoModal(){
  const m=displayList[currentIdx];if(!m) return;
  const year=(m.release_date||'').slice(0,4);
  const rating=m.vote_average?Math.round(m.vote_average*10)/10:null;
  const poster=m.poster_path?IMG185+m.poster_path:'';
  const genres=(m.genre_ids||[]).map(id=>GENRE_MAP[id]).filter(Boolean);

  if(!m._providers) m._providers=await fetchProviders(m.id);
  if(!m._overview){
    const d=await fetchDetails(m.id);
    if(d){m._overview=d.overview;m._runtime=d.runtime;}
  }
  const runtime=m._runtime||m.runtime;
  const overview=m._overview||m.overview||'';

  showModal(`
    <button class="modal-close-x" onclick="closeModal()">✕</button>
    <h2>${escHtml(m.title||'—')}</h2>
    <div class="info-inner">
      ${poster?`<img class="info-poster" src="${poster}" alt="">`:''}
      <div class="info-body">
        <div class="info-badges">
          ${year?`<span class="info-badge year">${year}</span>`:''}
          ${runtime?`<span class="info-badge year">${runtime} min</span>`:''}
          ${rating?`<span class="info-badge tmdb">★ ${rating} TMDB</span>`:''}
          ${genres.map(g=>`<span class="info-badge genre">${escHtml(g)}</span>`).join('')}
        </div>
        ${(m._providers||[]).length?`<div class="info-providers">${(m._providers).map(p=>`<span class="info-plat">${p.logo?`<img src="${p.logo}" alt="" loading="lazy">`:''}${escHtml(p.name)}</span>`).join('')}</div>`:''}
        ${overview?`<div class="info-synopsis">${escHtml(overview)}</div>`:''}
      </div>
    </div>
    <div class="modal-actions"><button class="btn-cancel" onclick="closeModal()">Cerrar</button></div>`);
}

// ═══════════════════════════════════════════════
// KEY MODAL
// ═══════════════════════════════════════════════
function openKeyModal(){
  const cur=getKey();
  showModal(`
    <button class="modal-close-x" onclick="closeModal()">✕</button>
    <h2>🎬 TMDB API Key</h2>
    <div class="key-steps">
      <div class="key-step"><span class="key-step-num">1</span><div class="key-step-body">Regístrate gratis en <a href="https://www.themoviedb.org" target="_blank">themoviedb.org</a></div></div>
      <div class="key-step"><span class="key-step-num">2</span><div class="key-step-body">Ve a <a href="https://www.themoviedb.org/settings/api" target="_blank">Ajustes → API</a> y solicita una key tipo <strong>Developer</strong> (uso personal, gratis).</div></div>
      <div class="key-step"><span class="key-step-num">3</span><div class="key-step-body">Copia la <strong>API Key (v3 auth)</strong> y pégala abajo.</div></div>
    </div>
    <input class="modal-input key-visible" id="key-inp" type="text" placeholder="tu api key v3…" value="${escHtml(cur)}">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cerrar</button>
      <button class="btn-primary" onclick="saveKey()">Guardar</button>
    </div>`);
  setTimeout(()=>document.getElementById('key-inp')?.focus(),50);
}
function saveKey(){
  const v=document.getElementById('key-inp')?.value.trim();
  if(v){setKey(v);showToast('Key guardada ✓');closeModal();loadMovies();}
  else closeModal();
}

// ═══════════════════════════════════════════════
// MODAL HELPERS
// ═══════════════════════════════════════════════
function showModal(html){document.getElementById('modal-container').innerHTML=`<div class="modal-overlay" onclick="overlayClose(event)"><div class="modal-box">${html}</div></div>`;}
function closeModal(){document.getElementById('modal-container').innerHTML='';}
function overlayClose(e){if(e.target.classList.contains('modal-overlay'))closeModal();}

// ═══════════════════════════════════════════════
// LOADING / EMPTY
// ═══════════════════════════════════════════════
function setLoading(on,text=''){const ls=document.getElementById('loading-screen');ls.style.display=on?'flex':'none';if(text)setLoadingText(text);}
function setLoadingText(t){const el=document.getElementById('loading-text');if(el)el.textContent=t;}
function setLoadingBar(pct){const el=document.getElementById('loading-bar');if(el)el.style.width=pct+'%';}
function showEmpty(on,msg=''){
  const el=document.getElementById('empty-state');el.classList.toggle('on',on);
  if(msg){const m=document.getElementById('empty-msg');if(m)m.textContent=msg;}
}

// ═══════════════════════════════════════════════
// TIZEN
// ═══════════════════════════════════════════════
function detectTizen(){
  if(navigator.userAgent.includes('Tizen')||navigator.userAgent.includes('SmartTV')){
    document.body.classList.add('tizen-detected');
    document.getElementById('tv-zoom').style.display='flex';
  }
}

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════
function escHtml(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showToast(msg,ms=2200){
  const t=document.createElement('div');t.className='toast-msg';t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),400);},ms);
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
window.addEventListener('load',async()=>{
  detectTizen();
  updateDots();
  const savedZoom=parseInt(localStorage.getItem('movienes_rail_zoom')||'160');
  onZoomChange(savedZoom);
  renderFilterBar();
  adjustLayout();
  if(!getKey()){
    setLoading(false);
    showEmpty(true,'Añade tu API Key de TMDB para empezar');
    showToast('Añade tu API Key de TMDB →',4000);
    setTimeout(()=>openKeyModal(),700);
    return;
  }
  await loadMovies();
});
</script>
