<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Movienes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f0ede8; --bg2:#e8e4de; --card-bg:#fff;
  --text:#1a1a1a; --text-muted:#888;
  --accent:#e63946; --accent2:#457b9d;
  --border:#d5d0c9; --divider:#e8e4de;
  --shadow:0 2px 12px rgba(0,0,0,.10); --shadow-lg:0 8px 32px rgba(0,0,0,.16);
  --tw:108px; --th:161px; --gap:10px;
  --cols:5;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);min-height:100vh;}

/* ── TOPBAR ── */
#topbar{position:fixed;top:0;left:0;right:0;z-index:1000;background:#1a1a1a;border-bottom:2px solid var(--accent);display:flex;flex-direction:column;}
#topbar-main{display:flex;align-items:center;gap:10px;padding:0 16px;height:52px;white-space:nowrap;overflow:hidden;}
#topbar h1{font-family:'Bebas Neue',sans-serif;font-size:26px;color:#fff;letter-spacing:2px;flex-shrink:0;}
#topbar-controls{display:flex;align-items:center;gap:8px;flex-wrap:nowrap;overflow:hidden;flex:1;}
#topbar-menu-btn{display:none;background:none;border:none;color:#aaa;font-size:20px;cursor:pointer;padding:4px 6px;margin-left:auto;flex-shrink:0;}
#topbar-drawer{display:none;flex-direction:column;gap:8px;background:#1a1a1a;padding:10px 16px 14px;border-top:1px solid #2a2a2a;}
#topbar-drawer.open{display:flex;}
.drawer-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
#topbar label{color:#aaa;font-size:12px;flex-shrink:0;}
#zoom-slider{-webkit-appearance:none;width:100px;height:4px;border-radius:2px;background:#444;outline:none;cursor:pointer;flex-shrink:0;}
#zoom-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer;}
#zoom-val{color:#aaa;font-size:11px;min-width:34px;flex-shrink:0;}
.topbar-key-btn{background:#2a2a2a;border:1px solid #555;color:#ccc;font-size:11px;padding:5px 10px;border-radius:4px;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:5px;transition:background .15s;flex-shrink:0;}
.topbar-key-btn:hover{background:#383838;}
.topbar-key-btn .dot{width:7px;height:7px;border-radius:50%;background:#555;flex-shrink:0;}
.topbar-key-btn.has-key .dot{background:#4caf50;}
.topbar-btn{background:var(--accent);color:#fff;border:none;padding:6px 12px;border-radius:4px;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:600;cursor:pointer;flex-shrink:0;transition:background .2s;}
.topbar-btn:hover{background:#c1121f;}
.topbar-btn.secondary{background:#2a2a2a;border:1px solid #444;}
.topbar-btn.secondary:hover{background:#3a3a3a;}
#title-search-wrap{position:relative;flex-shrink:0;}
#title-search{background:#2a2a2a;border:1px solid #444;color:#fff;font-size:11px;padding:5px 10px 5px 28px;border-radius:4px;width:150px;font-family:'DM Sans',sans-serif;outline:none;}
#title-search::placeholder{color:#666;}
#title-search:focus{border-color:#888;}
#ts-icon{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:#555;pointer-events:none;display:flex;}
#ts-clear{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:none;border:none;color:#666;cursor:pointer;font-size:14px;display:none;line-height:1;padding:0;}
#ts-clear.on{display:block;}

@media(max-width:900px){#topbar-controls{display:none;}#topbar-menu-btn{display:block;}}
@media(min-width:901px){#topbar-drawer{display:none !important;}}

/* ── FILTER BAR ── */
#filter-bar{position:fixed;top:52px;left:0;right:0;z-index:999;background:#1a1a1a;border-bottom:1px solid #2a2a2a;padding:6px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;min-height:40px;}
.filter-group{display:flex;align-items:center;gap:5px;}
.filter-icon{display:flex;align-items:center;flex-shrink:0;opacity:.85;}
.filter-toggle-btn{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s;border:1.5px solid #444;background:#2a2a2a;color:#888;flex-shrink:0;}
.filter-toggle-btn.on{border-color:#4caf50;color:#4caf50;background:#1a2a1a;}
.filter-toggle-btn.off{border-color:#444;color:#666;background:#2a2a2a;}
.filter-toggle-btn:hover{border-color:#777;color:#ccc;}
.filter-chip{background:#2a2a2a;color:#aaa;border:1px solid #3a3a3a;padding:3px 10px;border-radius:20px;font-size:11px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s;white-space:nowrap;}
.filter-chip:hover{background:#333;color:#ddd;}
.filter-chip.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.filter-clear{background:#fff;color:var(--accent);border:1.5px solid var(--accent);padding:3px 12px;border-radius:20px;font-size:11px;font-family:'DM Sans',sans-serif;font-weight:700;cursor:pointer;transition:all .15s;margin-left:auto;white-space:nowrap;}
.filter-clear:hover{background:#fff0f1;}
/* Mode chips — grey style, distinct from red active chips */
.mode-chip{background:#3a3a3a;color:#aaa;border:1px solid #555;padding:3px 11px;border-radius:20px;font-size:11px;font-family:'DM Sans',sans-serif;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;letter-spacing:.3px;}
.mode-chip:hover{background:#484848;color:#ddd;}
.mode-chip.active-new{background:#2a3d2a;color:#6fcf6f;border-color:#4caf50;}
.mode-chip.active-watched{background:#2a2a3d;color:#7b9fd4;border-color:#457b9d;}

/* ── CANVAS ── */
#canvas-viewport{position:fixed;inset:0;overflow:hidden;cursor:default;touch-action:none;}
#canvas-viewport.panning{cursor:grab;}
#canvas-viewport.panning-active{cursor:grabbing !important;}
#canvas-viewport.nav-mode{cursor:grab;}
#canvas-viewport.nav-mode.panning-active{cursor:grabbing !important;}
#canvas-wrapper{position:absolute;top:0;left:0;padding:120px 60px 200px;transform-origin:0 0;-webkit-transform-origin:0 0;will-change:transform;user-select:none;-webkit-user-select:none;}

/* ── GRID ── */
#movie-grid{display:flex;flex-wrap:wrap;gap:var(--gap);align-content:flex-start;}

/* ── MOVIE CARD ── */
.movie-card{position:relative;width:var(--tw);flex-shrink:0;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;}
.card-img-wrap{position:relative;width:var(--tw);height:var(--th);border-radius:6px;overflow:hidden;background:var(--bg2);}
.card-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
.card-no-poster{width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:8px;text-align:center;background:#d1cdc7;}
.card-no-poster span{font-size:11px;font-weight:700;color:#555;line-height:1.3;word-break:break-word;}

/* watched overlay */
.card-watched-overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;border-radius:6px;pointer-events:none;}
.card-watch-tick{font-size:clamp(36px,6vw,64px);color:#4caf50;text-shadow:0 2px 12px rgba(76,175,80,.5);line-height:1;}

/* confirm overlay — replaces card content */
.card-confirm-overlay{position:absolute;inset:0;background:rgba(20,20,20,.92);border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;z-index:20;padding:8px;}
.card-confirm-label{color:#fff;font-size:10px;font-weight:700;letter-spacing:.3px;text-shadow:0 1px 4px rgba(0,0,0,.6);}
.card-confirm-title{color:#ddd;font-size:9px;text-align:center;line-height:1.3;margin-bottom:2px;}
.card-confirm-btns{display:flex;gap:5px;}
.card-confirm-yes{background:#4caf50;color:#fff;border:none;border-radius:4px;padding:4px 12px;font-size:10px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;}
.card-confirm-yes:hover{background:#43a047;}
.card-confirm-no{background:#1a1a1a;color:#fff;border:1px solid #444;border-radius:4px;padding:4px 12px;font-size:10px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;}
.card-confirm-no:hover{background:#2a2a2a;}

/* rating badge */
.card-rating{position:absolute;top:5px;left:5px;z-index:3;background:rgba(0,0,0,.75);color:#f5c518;font-size:10px;font-weight:700;font-family:'DM Sans',sans-serif;padding:2px 6px;border-radius:4px;display:flex;align-items:center;gap:3px;line-height:1;}
.card-rating svg{flex-shrink:0;width:10px;height:10px;}

/* action buttons overlay (info + watch) */
.card-actions{position:absolute;bottom:5px;right:4px;z-index:10;display:flex;gap:3px;}
.card-action-btn{width:26px;height:20px;background:rgba(0,0,0,.6);border:none;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:.5;transition:opacity .15s,background .15s;-webkit-tap-highlight-color:transparent;}
.card-action-btn:hover,.movie-card:hover .card-action-btn{opacity:1;}
.card-action-btn svg{width:11px;height:11px;display:block;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
.card-action-btn.watch-btn.watched{background:rgba(76,175,80,.7);}
.card-action-btn.watch-btn.watched svg{stroke:#fff;}

/* card info below */
.card-info{margin-top:6px;}
.card-title{font-size:11px;font-weight:700;line-height:1.3;color:var(--text);word-break:break-word;white-space:normal;}
.card-meta{font-size:10px;color:var(--text-muted);margin-bottom:4px;}
.card-platforms{display:flex;flex-wrap:wrap;gap:2px;align-items:center;width:var(--tw);overflow:hidden;}
.platform-pill{display:inline-flex;align-items:center;gap:2px;background:#f2efea;border:1px solid var(--border);border-radius:3px;padding:1px 4px;font-size:9px;font-weight:600;color:#555;max-width:calc(var(--tw) - 4px);overflow:hidden;flex-shrink:1;min-width:0;}
.platform-pill img{width:11px;height:11px;object-fit:contain;flex-shrink:0;}
.platform-pill span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ── EMPTY STATE ── */
#empty-state{display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:#aaa;text-align:center;padding:80px 40px;}
#empty-state.on{display:flex;}
#empty-state svg{opacity:.3;}
#empty-state h3{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:#bbb;}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:2000;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal-box{background:#fff;border-radius:12px;padding:24px;width:100%;max-width:440px;box-shadow:var(--shadow-lg);animation:modalIn .18s ease;position:relative;}
@keyframes modalIn{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
.modal-box h2{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;margin-bottom:14px;}
.modal-close-x{position:absolute;top:14px;right:16px;background:none;border:none;font-size:20px;color:var(--text-muted);cursor:pointer;}
.modal-close-x:hover{color:var(--text);}
.modal-input{width:100%;border:1.5px solid var(--border);border-radius:6px;padding:9px 12px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;}
.modal-input:focus{border-color:var(--accent2);}
.modal-actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end;}
.btn-primary{background:var(--accent);color:#fff;border:none;padding:8px 20px;border-radius:6px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:700;cursor:pointer;}
.btn-primary:hover{background:#c1121f;}
.btn-cancel{background:none;border:1.5px solid var(--border);color:var(--text);padding:8px 16px;border-radius:6px;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;}
.btn-cancel:hover{background:var(--bg2);}
/* info modal */
.info-inner{display:flex;gap:14px;}
.info-poster{width:90px;min-width:90px;height:135px;object-fit:cover;border-radius:7px;background:var(--bg2);display:block;}
.info-body{flex:1;min-width:0;}
.info-badges{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.info-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px;}
.info-badge.year{background:#eee;color:#666;}
.info-badge.runtime{background:#eee;color:#666;}
.info-badge.tmdb{background:#e3f7ff;color:#0077a8;}
.info-badge.genre{background:#f0ede8;color:#888;border:1px solid var(--border);}
.info-plats{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.info-plat{display:inline-flex;align-items:center;gap:4px;background:#f5f2ee;border:1px solid var(--border);border-radius:4px;padding:2px 7px;font-size:10px;color:#555;}
.info-plat img{width:13px;height:13px;object-fit:contain;border-radius:2px;}
.info-synopsis{font-size:12px;color:#777;line-height:1.6;max-height:120px;overflow-y:auto;}
/* key steps */
.key-steps{margin-bottom:16px;display:flex;flex-direction:column;}
.key-step{font-size:12px;color:#555;line-height:1.6;display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid #eee;text-align:left;}
.key-step:last-child{border-bottom:none;}
.key-step-num{background:var(--accent);color:#fff;border-radius:50%;width:20px;height:20px;min-width:20px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:2px;}
.key-step a{color:var(--accent2);}
.key-visible{font-family:monospace;font-size:12px;}

/* ── SPINNER / LOADING ── */
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
#loading-screen{position:fixed;inset:0;z-index:5000;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
#loading-screen h2{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:3px;color:var(--accent);}
#loading-screen p{color:var(--text-muted);font-size:13px;}
#loading-progress{width:200px;height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:4px;}
#loading-bar{width:0%;height:100%;background:var(--accent);border-radius:2px;transition:width .3s;}

/* ── TOAST ── */
.toast-msg{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;z-index:9999;transition:opacity .4s;font-family:'DM Sans',sans-serif;white-space:nowrap;}

/* ── MODE BUTTONS (touch) ── */
#mode-btns{display:none;position:fixed;bottom:24px;right:20px;z-index:2000;flex-direction:column;gap:10px;align-items:center;}
.mode-btn{width:48px;height:48px;border-radius:50%;border:2px solid #ccc;box-shadow:0 3px 12px rgba(0,0,0,.25);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s,transform .15s;-webkit-tap-highlight-color:transparent;}
.mode-btn svg{pointer-events:none;}
#btn-nav{background:#fff;}
#btn-edit{background:#1a1a1a;border-color:#1a1a1a;}
#btn-nav.active{background:var(--accent);border-color:var(--accent);transform:scale(1.06);}
#btn-edit.active{background:var(--accent);border-color:var(--accent);transform:scale(1.06);}

/* ── NAV HINT ── */
#nav-hint{display:none;position:fixed;bottom:140px;right:16px;background:rgba(0,0,0,.75);color:#fff;font-size:11px;font-family:'DM Sans',sans-serif;padding:5px 10px;border-radius:16px;pointer-events:none;z-index:1999;white-space:nowrap;}

/* ── TV ZOOM ── */
#tv-zoom{position:fixed;top:70px;right:12px;display:none;flex-direction:column;gap:6px;z-index:2000;}
.tv-zoom-btn{width:44px;height:44px;background:rgba(0,0,0,.7);border:2px solid #555;border-radius:10px;color:#fff;font-size:26px;font-weight:300;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.tv-zoom-btn:focus{background:var(--accent);border-color:var(--accent);outline:none;}

/* nav-mode hides action buttons */
#canvas-viewport.nav-mode .card-actions{display:none !important;}

/* ── TIZEN ── */
.tizen-detected *{transition:none !important;}
.tizen-detected #canvas-wrapper{will-change:auto !important;}
.tizen-detected #canvas-viewport{overflow:visible !important;}
.tizen-detected #filter-bar{flex-wrap:nowrap !important;overflow-x:auto !important;-webkit-overflow-scrolling:touch;scrollbar-width:thin;}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  #topbar-main{height:48px !important;padding:0 10px !important;}
  #topbar h1{font-size:18px;}
  #topbar-controls{display:none !important;}
  #topbar-menu-btn{display:flex !important;margin-left:auto;}
  #topbar-drawer{position:fixed;top:48px;left:0;right:0;z-index:999;max-height:70vh;overflow-y:auto;}
  #filter-bar{top:48px !important;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;gap:6px;padding:8px 12px;scrollbar-width:none;}
  #filter-bar::-webkit-scrollbar{display:none;}
  .modal-overlay{padding:0;align-items:flex-end;}
  .modal-box{border-radius:16px 16px 0 0 !important;max-width:100% !important;width:100% !important;max-height:85vh !important;overflow-y:auto !important;padding:24px 20px 32px;}
  .modal-box::before{content:'';display:block;width:40px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 16px;}
  .info-inner{flex-direction:column;}
  .info-poster{width:70px;min-width:70px;height:105px;}
  .filter-chip,.filter-toggle-btn{padding:5px 14px;font-size:12px;}
  .card-action-btn{width:30px;height:24px;opacity:1 !important;}
}
@media(hover:none) and (pointer:coarse){
  #mode-btns{display:flex;}
  #nav-hint{display:block;opacity:0;transition:opacity .3s;}
  #nav-hint.visible{opacity:1;}
  .card-action-btn{opacity:1 !important;width:30px;height:24px;}
  #filter-bar{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;gap:6px;padding:8px 12px;scrollbar-width:none;}
  #filter-bar::-webkit-scrollbar{display:none;}
}
button,.movie-card,.filter-chip,.platform-pill{touch-action:manipulation;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--bg2);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>

<!-- TOPBAR -->
<div id="topbar">
  <div id="topbar-main">
    <h1>🎬 Movienes</h1>
    <span id="pan-hint" style="font-size:10px;color:#555;flex-shrink:0;display:none">Espacio + arrastrar · rueda para pan</span>
    <div id="topbar-controls">
      <button class="topbar-key-btn" id="tmdb-btn" onclick="openKeyModal()">
        <span class="dot" id="tmdb-dot"></span> TMDB
      </button>
      <label>Zoom:</label>
      <input type="range" id="zoom-slider" min="40" max="100" value="100" step="5" oninput="onSliderZoom(this.value)">
      <span id="zoom-val">100%</span>
      <button class="topbar-btn secondary" onclick="resetView()" title="Centrar vista">⌖</button>
      <button class="topbar-btn secondary" onclick="reloadAll()" title="Recargar">↻</button>
      <div id="title-search-wrap">
        <span id="ts-icon"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg></span>
        <input id="title-search" type="text" placeholder="Buscar título…" oninput="onTitleSearch(this.value)" onfocus="this.style.borderColor='#888'" onblur="this.style.borderColor='#444'">
        <button id="ts-clear" onclick="clearSearch()">✕</button>
      </div>
    </div>
    <button id="topbar-menu-btn" onclick="toggleDrawer()">☰</button>
  </div>
  <div id="topbar-drawer">
    <div class="drawer-row" style="justify-content:space-between;padding:4px 0 8px">
      <span style="font-family:'Bebas Neue',sans-serif;font-size:16px;color:#fff;letter-spacing:1px">Config</span>
      <button onclick="toggleDrawer()" style="background:none;border:none;color:#aaa;font-size:18px;cursor:pointer">✕</button>
    </div>
    <div class="drawer-row">
      <button class="topbar-key-btn" onclick="openKeyModal()"><span class="dot" id="tmdb-dot2"></span> TMDB</button>
      <button class="topbar-btn secondary" onclick="reloadAll();toggleDrawer()" style="flex:1">↻ Reload</button>
      <button class="topbar-btn secondary" onclick="resetView();toggleDrawer()" style="flex:1">⌖ Centrar</button>
    </div>
    <div class="drawer-row" style="align-items:center">
      <label style="color:#aaa;font-size:12px">Zoom:</label>
      <input type="range" id="zoom-slider2" min="40" max="100" value="100" step="5" style="flex:1" oninput="onSliderZoom(this.value)">
      <span id="zoom-val2" style="color:#aaa;font-size:11px;min-width:36px">100%</span>
    </div>
    <div class="drawer-row">

// CONSTANTS
// ═════════════════════════════════════════════════════════

const IMG185='https://image.tmdb.org/t/p/w185';

const PICKER_PLATFORMS=Object.values(
  Object.values(PROVIDER_MAP).reduce((acc,p)=>{acc[p.id]={...p,logoUrl:pLogo(p)};return acc;},{})
);
const GENRE_MAP={

};
const DURATION_FILTERS=[
  {id:'lt30',  label:'~30 min', test:c=>c._runtime&&c._runtime<=45},
  {id:'lt60',  label:'~1h',     test:c=>c._runtime&&c._runtime>45&&c._runtime<=75},

];

// ═════════════════════════════════════════════════════════
// STATE
// ═════════════════════════════════════════════════════════
let allMovies=[];
let watchedSet=new Set(JSON.parse(localStorage.getItem('movienes_watched')||'[]'));
// Ordered list of watched ids (most recent last → we show most recent first)
let watchedOrder=JSON.parse(localStorage.getItem('movienes_watched_order')||'[]');
let maxCount=20;
let activeGenre=null;
let activeProvider=null;
let activeDuration=null;
let activeGenreFilter=null; // genre chip filter (separate from load genre)
let showPlatforms=true;
let showRatings=true;
let searchQuery='';

// viewMode: null = normal, 'new' = latest by release date from TMDB, 'watched' = watched list
let viewMode=null;

// ═════════════════════════════════════════════════════════
// PAN / ZOOM ENGINE (Figma-style)
// ═════════════════════════════════════════════════════════
let _cx=60,_cy=120,_cz=1.0;
let _panning=false,_panStartX=0,_panStartY=0,_panOriginX=0,_panOriginY=0;
let _spaceDown=false;
let _touches=[],_pinchDist0=0,_pinchZ0=0,_pinchCx0=0,_pinchCy0=0;
const MIN_Z=0.15,MAX_Z=2.0;

function resetView(){_cx=60;_cy=120;_cz=1.0;applyTransform(true);}

let _rafPending=false;
function applyTransform(animate=false){
  const w=document.getElementById('canvas-wrapper');if(!w)return;
  if(animate){
    w.style.transition='transform .12s ease';
    w.style.transform=`translate(${_cx}px,${_cy}px) scale(${_cz})`;
  } else {
    if(_rafPending)return;
    _rafPending=true;
    requestAnimationFrame(()=>{
      _rafPending=false;
      w.style.transition='none';
      w.style.transform=`translate(${_cx}px,${_cy}px) scale(${_cz})`;
    });
  }
  const pct=Math.round(_cz*100);
  ['zoom-val','zoom-val2'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=pct+'%';});
  ['zoom-slider','zoom-slider2'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=Math.max(40,Math.min(100,pct));});
}

function setCanvasZoom(newZ,pivotX,pivotY){
  newZ=Math.max(MIN_Z,Math.min(MAX_Z,newZ));
  const vp=document.getElementById('canvas-viewport');
  if(pivotX===undefined){pivotX=vp.clientWidth/2;pivotY=vp.clientHeight/2;}
  const dz=newZ/_cz;
  _cx=pivotX-(pivotX-_cx)*dz;_cy=pivotY-(pivotY-_cy)*dz;_cz=newZ;
  applyTransform();
}
function onSliderZoom(v){setCanvasZoom(v/100);}

// Keyboard
window.addEventListener('keydown',e=>{
  if(e.code==='Space'&&!e.target.matches('input,textarea')){
    e.preventDefault();_spaceDown=true;
    document.getElementById('canvas-viewport')?.classList.add('panning');
  }
});
window.addEventListener('keyup',e=>{
  if(e.code==='Space'){_spaceDown=false;document.getElementById('canvas-viewport')?.classList.remove('panning','panning-active');}
});

// Wheel
document.getElementById('canvas-viewport')?.addEventListener('wheel',e=>{
  e.preventDefault();
  if(e.ctrlKey||e.metaKey){
    const rect=document.getElementById('canvas-viewport').getBoundingClientRect();
    setCanvasZoom(_cz*(e.deltaY>0?0.9:1.1),e.clientX-rect.left,e.clientY-rect.top);
  } else {
    _cx-=e.deltaX;_cy-=e.deltaY;applyTransform();
  }
},{passive:false});

// Mouse drag (space/middle)
document.getElementById('canvas-viewport')?.addEventListener('mousedown',e=>{
  if(_spaceDown||e.button===1||e.button===2){
    e.preventDefault();_panning=true;_panStartX=e.clientX;_panStartY=e.clientY;_panOriginX=_cx;_panOriginY=_cy;
    document.getElementById('canvas-viewport')?.classList.add('panning-active');
  }
});
let _rmx=0,_rmy=0,_rmPending=false;
window.addEventListener('mousemove',e=>{
  if(!_panning)return;
  _rmx=_panOriginX+(e.clientX-_panStartX);_rmy=_panOriginY+(e.clientY-_panStartY);
  if(!_rmPending){_rmPending=true;requestAnimationFrame(()=>{_cx=_rmx;_cy=_rmy;applyTransform();_rmPending=false;});}
});
window.addEventListener('mouseup',()=>{
  _panning=false;document.getElementById('canvas-viewport')?.classList.remove('panning-active');
});

// Touch (pinch + pan in nav mode)
const vp=document.getElementById('canvas-viewport');
vp?.addEventListener('touchstart',e=>{
  _touches=[...e.touches];
  if(_touches.length===2){
    _pinchDist0=Math.hypot(_touches[1].clientX-_touches[0].clientX,_touches[1].clientY-_touches[0].clientY);
    _pinchZ0=_cz;_pinchCx0=_cx;_pinchCy0=_cy;
  } else if(_navMode&&_touches.length===1){
    _panning=true;_panStartX=_touches[0].clientX;_panStartY=_touches[0].clientY;_panOriginX=_cx;_panOriginY=_cy;
  }
},{passive:true});
vp?.addEventListener('touchmove',e=>{
  if(e.touches.length===2){
    e.preventDefault();
    const t=[...e.touches];
    const dist=Math.hypot(t[1].clientX-t[0].clientX,t[1].clientY-t[0].clientY);
    const scale=dist/_pinchDist0;
    const midX=(t[0].clientX+t[1].clientX)/2,midY=(t[0].clientY+t[1].clientY)/2;
    const newZ=Math.max(MIN_Z,Math.min(MAX_Z,_pinchZ0*scale));
    const dz=newZ/_pinchZ0;
    _cx=midX-(midX-_pinchCx0)*dz;_cy=midY-(midY-_pinchCy0)*dz;_cz=newZ;
    applyTransform();
  } else if(_navMode&&_panning&&e.touches.length===1){
    e.preventDefault();
    _cx=_panOriginX+(e.touches[0].clientX-_panStartX);
    _cy=_panOriginY+(e.touches[0].clientY-_panStartY);
    applyTransform();
  }
},{passive:false});
vp?.addEventListener('touchend',()=>{_touches=[];if(_navMode)_panning=false;});

// ═════════════════════════════════════════════════════════
// MOBILE MODES
// ═════════════════════════════════════════════════════════
function setMode(mode){

// ═════════════════════════════════════════════════════════
// TOPBAR HELPERS

// ═════════════════════════════════════════════════════════
// KEYS
// ═════════════════════════════════════════════════════════
function getKey(){return localStorage.getItem('movienes_tmdb_key')||'';}

// ═════════════════════════════════════════════════════════
// TITLE SEARCH
// ═════════════════════════════════════════════════════════
let _searchDb;

  document.getElementById('title-search').value=val;
  const d=document.getElementById('title-search-drawer');if(d)d.value=val;
  document.getElementById('ts-clear').className=val?'on':'';

// ═════════════════════════════════════════════════════════
// TMDB API
// ═════════════════════════════════════════════════════════
async function tmdbGet(path){
  const key=getKey();if(!key)return null;
  const sep=path.includes('?')?'&':'?';
  try{
    const ctrl=new AbortController();setTimeout(()=>ctrl.abort(),8000);
    const r=await fetch(`${TMDB_BASE}${path}${sep}api_key=${key}`,{signal:ctrl.signal});
    if(!r.ok)return null;
    return await r.json();
  }catch{return null;}
}

async function fetchPage(page,genreId,byRating){
  const sort=byRating?'vote_average.desc':'release_date.desc';
  const gp=genreId?`&with_genres=${genreId}`:'';
  const pp=activeProvider?`&with_watch_providers=${getProvId(activeProvider)}`:'';
  // Always filter <5 and require minimum vote count for reliability
  const d=await tmdbGet(`/discover/movie?language=es-ES&region=ES&sort_by=${sort}&vote_average.gte=5&vote_count.gte=20&watch_region=ES&with_watch_monetization_types=flatrate&include_adult=false&page=${page}${gp}${pp}`);
  return(d?.results||[]).filter(x=>x.poster_path);
}
function getProvId(pid){const e=Object.entries(PROVIDER_MAP).find(([,v])=>v.id===pid);return e?e[0]:null;}

async function fetchProviders(tmdbId){
  const d=await tmdbGet(`/movie/${tmdbId}/watch/providers`);if(!d)return[];
  const region=d.results?.ES||{};
  const out=[],seen=new Set();
  (region.flatrate||[]).forEach(p=>{
    if(/channel|addon|with ads/i.test(p.provider_name))return;
    const mapped=PROVIDER_MAP[p.provider_id];
    const pid=mapped?.id||('p'+p.provider_id);
    if(seen.has(pid))return;seen.add(pid);
    const logo=p.logo_path?'https://image.tmdb.org/t/p/w45'+p.logo_path:(mapped?pLogo(mapped):'');
    out.push({id:pid,name:mapped?.name||p.provider_name,logo});
  });
  return out;
}

async function fetchDetails(tmdbId){return await tmdbGet(`/movie/${tmdbId}?language=es-ES`);}

// ═════════════════════════════════════════════════════════
// LOAD MOVIES
// ═════════════════════════════════════════════════════════
async function loadMovies(){
  if(!getKey()){setLoading(false);setEmptyMsg('Añade tu API Key de TMDB para empezar');showEmpty(true);return;}
  _loadingAbort=false;allMovies=[];
  setLoading(true,'Cargando películas…');setLoadingBar(0);
  const genreId=activeGenre?Object.entries(GENRE_MAP).find(([,v])=>v===activeGenre)?.[0]:null;
  const byRating=!!activeGenre;

  let page=1,collected=[];
  while(collected.length<maxCount&&page<=6){
    if(_loadingAbort)return;
    setLoadingBar(Math.round(collected.length/maxCount*60));
    setLoadingText(`Página ${page}…`);
    const batch=await fetchPage(page,genreId,byRating);
    if(!batch.length)break;
    collected=[...collected,...batch];
    page++;
  }
  allMovies=collected.slice(0,maxCount);
  setLoadingBar(65);
  if(!allMovies.length){setLoading(false);setEmptyMsg('Sin resultados para este filtro');showEmpty(true);return;}

  // Enrich first 12 with providers
  setLoadingText('Plataformas…');
  const bsz=Math.min(12,allMovies.length);
  await Promise.all(allMovies.slice(0,bsz).map(async(m,i)=>{
    if(_loadingAbort)return;
    m._providers=await fetchProviders(m.id);
    if(i%4===0)setLoadingBar(65+Math.round(i/bsz*32));
  }));
  setLoadingBar(100);
  setTimeout(()=>{
    setLoading(false);
    renderGrid();
    adjustFilterTop();
    // Background: load rest of providers + runtime for all
    (async()=>{
      for(let i=bsz;i<allMovies.length;i++){
        if(_loadingAbort)return;
        allMovies[i]._providers=await fetchProviders(allMovies[i].id);
        const el=document.querySelector(`.movie-card[data-id="${allMovies[i].id}"] .card-platforms`);
        if(el)el.innerHTML=renderPlatformPills(allMovies[i]);
      }
      // Lazy-load runtime for all cards
      for(let i=0;i<allMovies.length;i++){
        if(_loadingAbort)return;
        if(allMovies[i]._runtime!==undefined)continue;
        const d=await fetchDetails(allMovies[i].id);
        if(d){allMovies[i]._runtime=d.runtime||null;allMovies[i]._overview=d.overview||'';}
        // Update meta on card
        const metaEl=document.querySelector(`.movie-card[data-id="${allMovies[i].id}"] .card-meta`);
        const yr=(allMovies[i].release_date||'').slice(0,4);
        if(metaEl)metaEl.textContent=yr+(allMovies[i]._runtime?` · ${allMovies[i]._runtime} min`:'');
      }
    })();
  },180);
}

async function reloadAll(){
  _loadingAbort=true;
  await new Promise(r=>setTimeout(r,80));
  _loadingAbort=false;
  if(viewMode==='new') loadNewMovies();
  else if(viewMode==='watched') loadWatchedMovies();
  else loadMovies();
}

// Cache for watched-mode fetched data
let _watchedCache=[];

async function toggleViewMode(mode){
  if(viewMode===mode){
    // Toggle off → back to normal
    viewMode=null;
    renderFilterBar();
    loadMovies();
    return;
  }
  viewMode=mode;
  renderFilterBar();
  if(mode==='new') await loadNewMovies();
  else if(mode==='watched') await loadWatchedMovies();
}

async function loadNewMovies(){
  // NEW: latest streaming movies with good ratings, sorted by rating desc
  if(!getKey()){setLoading(false);setEmptyMsg('Añade tu API Key de TMDB para empezar');showEmpty(true);return;}
  _loadingAbort=false;allMovies=[];
  setLoading(true,'Cargando novedades…');setLoadingBar(0);
  const pp=activeProvider?`&with_watch_providers=${getProvId(activeProvider)}`:'';
  // Sort by release_date but filter low-rated; then client-sort by rating
  let page=1,collected=[];
  while(collected.length<maxCount&&page<=6){
    if(_loadingAbort)return;
    setLoadingBar(Math.round(collected.length/maxCount*60));
    setLoadingText(`Página ${page}…`);
    const d=await tmdbGet(`/discover/movie?language=es-ES&region=ES&sort_by=release_date.desc&vote_average.gte=5&vote_count.gte=20&watch_region=ES&with_watch_monetization_types=flatrate&include_adult=false&page=${page}${pp}`);
    const batch=(d?.results||[]).filter(x=>x.poster_path);
    if(!batch.length)break;
    collected=[...collected,...batch];
    page++;
  }
  // Sort collected by vote_average desc (highest rated first)
  collected.sort((a,b)=>(b.vote_average||0)-(a.vote_average||0));
  allMovies=collected.slice(0,maxCount);
  setLoadingBar(65);
  if(!allMovies.length){setLoading(false);setEmptyMsg('Sin novedades disponibles');showEmpty(true);return;}
  setLoadingText('Plataformas…');
  const bsz=Math.min(12,allMovies.length);
  await Promise.all(allMovies.slice(0,bsz).map(async(m,i)=>{
    if(_loadingAbort)return;
    m._providers=await fetchProviders(m.id);
    if(i%4===0)setLoadingBar(65+Math.round(i/bsz*32));
  }));
  setLoadingBar(100);
  setTimeout(()=>{
    setLoading(false);renderGrid();adjustFilterTop();
    (async()=>{
      for(let i=bsz;i<allMovies.length;i++){if(_loadingAbort)return;allMovies[i]._providers=await fetchProviders(allMovies[i].id);const el=document.querySelector(`.movie-card[data-id="${allMovies[i].id}"] .card-platforms`);if(el)el.innerHTML=renderPlatformPills(allMovies[i]);}
      for(let i=0;i<allMovies.length;i++){if(_loadingAbort)return;if(allMovies[i]._runtime!==undefined)continue;const d=await fetchDetails(allMovies[i].id);if(d){allMovies[i]._runtime=d.runtime||null;allMovies[i]._overview=d.overview||'';}const metaEl=document.querySelector(`.movie-card[data-id="${allMovies[i].id}"] .card-meta`);const yr=(allMovies[i].release_date||'').slice(0,4);if(metaEl)metaEl.textContent=yr+(allMovies[i]._runtime?` · ${allMovies[i]._runtime} min`:'');}
    })();
  },180);
}

async function loadWatchedMovies(){
  // VISTAS: show all watched movies, ordered by when they were marked (most recent first)
  if(!getKey()){setLoading(false);setEmptyMsg('Añade tu API Key de TMDB para empezar');showEmpty(true);return;}
  if(!watchedOrder.length){setLoading(false);setEmptyMsg('No has marcado ninguna película como vista todavía');showEmpty(true);allMovies=[];renderGrid();return;}
  _loadingAbort=false;
  setLoading(true,'Cargando vistas…');setLoadingBar(0);
  // Fetch details for each watched movie (most recent first)
  const orderedIds=[...watchedOrder].reverse(); // most recent first
  const toFetch=orderedIds.slice(0,Math.min(orderedIds.length,maxCount));
  const results=[];
  for(let i=0;i<toFetch.length;i++){
    if(_loadingAbort)return;
    setLoadingBar(Math.round(i/toFetch.length*75));
    const id=toFetch[i];
    // Check if we already have it in allMovies or _watchedCache
    let m=allMovies.find(x=>String(x.id)===id)||_watchedCache.find(x=>String(x.id)===id);
    if(!m){
      const d=await tmdbGet(`/movie/${id}?language=es-ES`);
      if(d&&d.poster_path){
        m={id:d.id,title:d.title,release_date:d.release_date,poster_path:d.poster_path,vote_average:d.vote_average,genre_ids:(d.genres||[]).map(g=>g.id),_runtime:d.runtime,_overview:d.overview};
        _watchedCache.push(m);
      }
    }
    if(m) results.push(m);
  }
  setLoadingBar(80);
  // Fetch providers for first batch
  const bsz=Math.min(10,results.length);
  await Promise.all(results.slice(0,bsz).map(async m=>{
    if(!m._providers)m._providers=await fetchProviders(m.id);
  }));
  setLoadingBar(100);
  allMovies=results;
  setTimeout(()=>{
    setLoading(false);renderGrid();adjustFilterTop();
    (async()=>{for(let i=bsz;i<results.length;i++){if(_loadingAbort)return;if(!results[i]._providers)results[i]._providers=await fetchProviders(results[i].id);const el=document.querySelector(`.movie-card[data-id="${results[i].id}"] .card-platforms`);if(el)el.innerHTML=renderPlatformPills(results[i]);}})();
  },180);
}

// ═════════════════════════════════════════════════════════
// FILTER BAR
// ═════════════════════════════════════════════════════════
function renderFilterBar(){
  setTimeout(adjustFilterTop,40);
  const bar=document.getElementById('filter-bar');if(!bar)return;
  const genres=Object.values(GENRE_MAP).sort();
  const starSvg=`<svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`;
  const eyeSvg=`<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
  const clockSvg=`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg>`;
  const filmSvg=`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 2l-4 5-4-5"/></svg>`;
  const hasActive=activeGenre||activeProvider||activeDuration||activeGenreFilter;

  // Count pills
  const countHtml=`<div class="filter-group">${[20,40,60,100].map(n=>`<button class="filter-chip${maxCount===n?' active':''}" onclick="setCount(${n},this)">${n}</button>`).join('')}</div>`;

  // View mode buttons (grey style)
  const newCls=viewMode==='new'?'mode-chip active-new':'mode-chip';
  const watchedCls=viewMode==='watched'?'mode-chip active-watched':'mode-chip';
  const viewModeHtml=`<div class="filter-group" style="gap:5px">
    <button class="${newCls}" onclick="toggleViewMode('new')" title="Últimos estrenos en streaming">🆕 NEW</button>
    <button class="${watchedCls}" onclick="toggleViewMode('watched')" title="Películas marcadas como vistas">✓ VISTAS</button>
  </div>`;

  bar.innerHTML=`
    ${countHtml}
    ${viewModeHtml}
    <button class="filter-toggle-btn ${showPlatforms?'on':'off'}" onclick="toggleShowPlatforms()">${eyeSvg} Plataformas</button>
    <button class="filter-toggle-btn ${showRatings?'on':'off'}" onclick="toggleShowRatings()">${starSvg} Nota</button>
    <div class="filter-group">
      <span class="filter-icon">${clockSvg}</span>
      ${DURATION_FILTERS.map(f=>`<button class="filter-chip${activeDuration===f.id?' active':''}" onclick="toggleDuration('${f.id}')">${f.label}</button>`).join('')}
    </div>
    <div class="filter-group">
      <span class="filter-icon">${filmSvg}</span>
      ${PICKER_PLATFORMS.map(p=>`<button class="filter-chip${activeProvider===p.id?' active':''}" onclick="toggleProvider('${p.id}')">${escHtml(p.name)}</button>`).join('')}
    </div>
    <div class="filter-group">
      ${genres.map(g=>`<button class="filter-chip${activeGenre===g?' active':''}" onclick="toggleGenre('${escHtml(g)}')">${escHtml(g)}</button>`).join('')}
    </div>
    ${hasActive?`<button class="filter-clear" onclick="clearFilters()">✕ Limpiar</button>`:''}
  `;
}

function setCount(n,btn){
  maxCount=n;
  document.querySelectorAll('#filter-bar .filter-chip').forEach(b=>{if([20,40,60,100].map(String).includes(b.textContent))b.classList.remove('active');});
  btn?.classList.add('active');
  if(viewMode==='new') loadNewMovies();
  else if(viewMode==='watched') loadWatchedMovies();
  else loadMovies();
}
function toggleGenre(g){
  viewMode=null; // exit special view modes when changing genre
  if(activeGenre===g){activeGenre=null;}else{activeGenre=g;}
  renderFilterBar();loadMovies();
}
function toggleProvider(pid){
  activeProvider=activeProvider===pid?null:pid;
  renderFilterBar();
  if(viewMode==='new') loadNewMovies();
  else if(viewMode==='watched') loadWatchedMovies();
  else loadMovies();
}
function toggleDuration(id){
  activeDuration=activeDuration===id?null:id;
  renderFilterBar();renderGrid();
}
function clearFilters(){activeGenre=null;activeProvider=null;activeDuration=null;viewMode=null;renderFilterBar();loadMovies();}
function toggleShowPlatforms(){showPlatforms=!showPlatforms;renderFilterBar();renderGrid();}
function toggleShowRatings(){showRatings=!showRatings;renderFilterBar();renderGrid();}

// ═════════════════════════════════════════════════════════
// WATCHED
// ═════════════════════════════════════════════════════════
function saveWatched(){
  localStorage.setItem('movienes_watched',JSON.stringify([...watchedSet]));
  localStorage.setItem('movienes_watched_order',JSON.stringify(watchedOrder));
}

function showWatchConfirm(id){
  // Show confirm overlay ON the card itself
  const card=document.querySelector(`.movie-card[data-id="${id}"]`);if(!card)return;
  // Remove any existing confirm
  card.querySelectorAll('.card-confirm-overlay').forEach(e=>e.remove());
  const m=allMovies.find(x=>String(x.id)===String(id));if(!m)return;
  const div=document.createElement('div');
  div.className='card-confirm-overlay';
  div.innerHTML=`
    <div class="card-confirm-label">¿Vista?</div>
    <div class="card-confirm-title">${escHtml(m.title||'')}</div>
    <div class="card-confirm-btns">
      <button class="card-confirm-no" onclick="event.stopPropagation();dismissConfirm('${id}')">No</button>
      <button class="card-confirm-yes" onclick="event.stopPropagation();doMarkWatched('${id}')">Sí</button>
    </div>`;
  card.querySelector('.card-img-wrap').appendChild(div);
}
function dismissConfirm(id){
  document.querySelector(`.movie-card[data-id="${id}"] .card-confirm-overlay`)?.remove();
}
function doMarkWatched(id){
  const sid=String(id);
  const isWatched=watchedSet.has(sid);
  if(isWatched){
    watchedSet.delete(sid);
    watchedOrder=watchedOrder.filter(x=>x!==sid);
  } else {
    watchedSet.add(sid);
    // Remove from order if already there (re-add at end = most recent)
    watchedOrder=watchedOrder.filter(x=>x!==sid);
    watchedOrder.push(sid);
  }
  saveWatched();
  // In watched view mode, re-render the full grid when unmarking
  if(viewMode==='watched'&&!isWatched===false){
    // just unmarked — remove card from watched view
    if(!searchQuery) document.querySelector(`.movie-card[data-id="${sid}"]`)?.remove();
    if(!document.querySelectorAll('.movie-card').length) document.getElementById('empty-state').classList.add('on');
    return;
  }
  // Re-render just that card
  const m=allMovies.find(x=>String(x.id)===sid)||_watchedCache.find(x=>String(x.id)===sid);
  const card=document.querySelector(`.movie-card[data-id="${sid}"]`);
  if(card&&m){
    const wrap=card.querySelector('.card-img-wrap');
    wrap.querySelectorAll('.card-watched-overlay,.card-confirm-overlay').forEach(e=>e.remove());
    if(watchedSet.has(sid)){
      const ov=document.createElement('div');ov.className='card-watched-overlay';
      ov.innerHTML='<div class="card-watch-tick">✓</div>';
      wrap.appendChild(ov);
    }
    const wb=card.querySelector('.watch-btn');
    if(wb){wb.classList.toggle('watched',watchedSet.has(sid));wb.title=watchedSet.has(sid)?'Quitar marca':'Marcar como vista';}
  }
  // In normal mode, remove card from grid after marking
  if(!isWatched&&viewMode!=='watched'&&viewMode!=='new'&&!searchQuery){
    setTimeout(()=>card?.remove(),50);
  }
}

// ═════════════════════════════════════════════════════════
// RENDER GRID
// ═════════════════════════════════════════════════════════
function getDisplayList(){
  let list=allMovies;
  // Duration filter
  if(activeDuration){
    const df=DURATION_FILTERS.find(f=>f.id===activeDuration);
    if(df) list=list.filter(m=>df.test(m));
  }
  // Search
  if(searchQuery) list=list.filter(m=>(m.title||'').toLowerCase().includes(searchQuery));
  // In watched mode: show all (they're already all watched), no hiding
  // In new mode: show all including watched (with overlay)
  // In normal mode: hide watched unless searching
  if(!searchQuery&&viewMode===null) list=list.filter(m=>!watchedSet.has(String(m.id)));
  return list;
}

function renderPlatformPills(m){
  if(!showPlatforms) return '';
  const providers=m._providers||[];
  if(!providers.length) return '';
  return providers.map(p=>`<span class="platform-pill">${p.logo?`<img src="${p.logo}" alt="">`:''}<span>${escHtml(p.name)}</span></span>`).join('');
}

function renderGrid(){
  const grid=document.getElementById('movie-grid');
  const emptyEl=document.getElementById('empty-state');
  const list=getDisplayList();

  if(!list.length){
    // Clear cards, show empty
    grid.querySelectorAll('.movie-card').forEach(e=>e.remove());
    emptyEl.classList.add('on');
    return;
  }
  emptyEl.classList.remove('on');

  const infoSvg=`<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" stroke="#fff" fill="none"/><line x1="12" y1="8" x2="12" y2="8" stroke="#fff" stroke-width="3"/><line x1="12" y1="11" x2="12" y2="16" stroke="#fff"/></svg>`;
  const tickSvg=`<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12" stroke="#fff"/></svg>`;

  // Build map of existing cards for diff
  const existing=new Map();
  grid.querySelectorAll('.movie-card').forEach(el=>existing.set(el.dataset.id,el));

  // Render/update cards in order
  let prevEl=emptyEl;
  list.forEach(m=>{
    const id=String(m.id);
    const isWatched=watchedSet.has(id);
    const inSearch=!!searchQuery;
    const year=(m.release_date||'').slice(0,4);
    const rating=m.vote_average?Math.round(m.vote_average*10)/10:null;

    if(existing.has(id)){
      // Update existing
      const card=existing.get(id);
      existing.delete(id);
      // Update rating
      const rb=card.querySelector('.card-rating');
      if(rb) rb.style.display=showRatings&&rating?'':'none';
      // Update platforms
      const pp=card.querySelector('.card-platforms');
      if(pp) pp.innerHTML=renderPlatformPills(m);
      // Update watched overlay
      const wrap=card.querySelector('.card-img-wrap');
      wrap.querySelectorAll('.card-watched-overlay').forEach(e=>e.remove());
      if(isWatched){
        const ov=document.createElement('div');ov.className='card-watched-overlay';
        ov.innerHTML='<div class="card-watch-tick">✓</div>';
        wrap.appendChild(ov);
      }
      const wb=card.querySelector('.watch-btn');
      if(wb){wb.classList.toggle('watched',isWatched);wb.title=isWatched?'Quitar marca':'Marcar como vista';}
      // Reorder
      grid.insertBefore(card,prevEl.nextSibling);
      prevEl=card;
    } else {
      // Create new card
      const card=document.createElement('div');
      card.className='movie-card';card.dataset.id=id;

      const posterHtml=m.poster_path
        ?`<img src="${IMG185}${m.poster_path}" alt="${escHtml(m.title||'')}" loading="lazy">`
        :`<div class="card-no-poster"><span>${escHtml(m.title||'')}</span></div>`;

      const watchedOverlay=isWatched?`<div class="card-watched-overlay"><div class="card-watch-tick">✓</div></div>`:'';
      const ratingHtml=showRatings&&rating?`<div class="card-rating"><svg viewBox="0 0 24 24" fill="#f5c518" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>${rating}</div>`:'';
      const platHtml=renderPlatformPills(m);

      card.innerHTML=`
        <div class="card-img-wrap">
          ${posterHtml}
          ${ratingHtml}
          ${watchedOverlay}
          <div class="card-actions">
            <button class="card-action-btn" onclick="event.stopPropagation();openInfoModal('${id}')" title="Info">${infoSvg}</button>
            <button class="card-action-btn watch-btn${isWatched?' watched':''}" onclick="event.stopPropagation();handleWatchClick('${id}')" title="${isWatched?'Quitar marca':'Marcar como vista'}">${tickSvg}</button>
          </div>
        </div>
        <div class="card-info">
          <div class="card-title">${escHtml(m.title||'')}</div>
          <div class="card-meta">${year}${m._runtime?` · ${m._runtime} min`:''}</div>
          <div class="card-platforms">${platHtml}</div>
        </div>`;

      grid.insertBefore(card,prevEl.nextSibling);
      prevEl=card;
    }
  });

  // Remove cards no longer in list
  existing.forEach(el=>el.remove());
}

function handleWatchClick(id){
  const isWatched=watchedSet.has(String(id));
  if(isWatched){
    doMarkWatched(id);
  } else {
    showWatchConfirm(id);
  }
}

// ═════════════════════════════════════════════════════════
// INFO MODAL
// ═════════════════════════════════════════════════════════
async function openInfoModal(id){
  const m=allMovies.find(x=>String(x.id)===String(id));if(!m)return;
  const year=(m.release_date||'').slice(0,4);
  const rating=m.vote_average?Math.round(m.vote_average*10)/10:null;
  const poster=m.poster_path?IMG185+m.poster_path:'';
  const genres=(m.genre_ids||[]).map(gid=>GENRE_MAP[gid]).filter(Boolean);

  if(!m._providers)m._providers=await fetchProviders(m.id);
  if(!m._overview){
    const d=await fetchDetails(m.id);
    if(d){m._overview=d.overview;m._runtime=d.runtime;
      // Update meta on card
      const card=document.querySelector(`.movie-card[data-id="${id}"] .card-meta`);
      if(card&&m._runtime)card.textContent=`${year} · ${m._runtime} min`;
    }
  }

  showModal(`
    <button class="modal-close-x" onclick="closeModal()">✕</button>
    <h2>${escHtml(m.title||'—')}</h2>
    <div class="info-inner">
      ${poster?`<img class="info-poster" src="${poster}" alt="">`:''}
      <div class="info-body">
        <div class="info-badges">
          ${year?`<span class="info-badge year">${year}</span>`:''}
          ${m._runtime?`<span class="info-badge runtime">${m._runtime} min</span>`:''}
          ${rating?`<span class="info-badge tmdb">★ ${rating} TMDB</span>`:''}
          ${genres.map(g=>`<span class="info-badge genre">${escHtml(g)}</span>`).join('')}
        </div>
        ${(m._providers||[]).length?`<div class="info-plats">${(m._providers).map(p=>`<span class="info-plat">${p.logo?`<img src="${p.logo}" alt="" loading="lazy">`:''}${escHtml(p.name)}</span>`).join('')}</div>`:''}
        ${m._overview?`<div class="info-synopsis">${escHtml(m._overview)}</div>`:'<div class="info-synopsis" style="color:#ccc;font-style:italic">Cargando sinopsis…</div>'}
      </div>
    </div>
    <div class="modal-actions"><button class="btn-cancel" onclick="closeModal()">Cerrar</button></div>`);
}

// ═════════════════════════════════════════════════════════
// KEY MODAL
// ═════════════════════════════════════════════════════════
function openKeyModal(){
  const cur=getKey();
  showModal(`
    <button class="modal-close-x" onclick="closeModal()">✕</button>
    <h2>🎬 TMDB API Key</h2>
    <div class="key-steps">
      <div class="key-step"><span class="key-step-num">1</span><div class="key-step-body">Regístrate gratis en <a href="https://www.themoviedb.org" target="_blank">themoviedb.org</a></div></div>
      <div class="key-step"><span class="key-step-num">2</span><div class="key-step-body">Ve a <a href="https://www.themoviedb.org/settings/api" target="_blank">Ajustes → API</a> y solicita una key tipo <strong>Developer</strong> (personal, gratis).</div></div>
      <div class="key-step"><span class="key-step-num">3</span><div class="key-step-body">Copia la <strong>API Key (v3 auth)</strong> y pégala abajo.</div></div>
    </div>
    <input class="modal-input key-visible" id="key-inp" type="text" placeholder="tu api key v3…" value="${escHtml(cur)}">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cerrar</button>
      <button class="btn-primary" onclick="saveKey()">Guardar</button>
    </div>`);
  setTimeout(()=>document.getElementById('key-inp')?.focus(),50);
}
function saveKey(){
  const v=document.getElementById('key-inp')?.value.trim();
  if(v){setKey(v);showToast('Key guardada ✓');closeModal();loadMovies();}else closeModal();
}

// ═════════════════════════════════════════════════════════
// MODAL HELPERS
// ═════════════════════════════════════════════════════════
function showModal(html){document.getElementById('modal-container').innerHTML=`<div class="modal-overlay" onclick="overlayClose(event)"><div class="modal-box">${html}</div></div>`;}
function closeModal(){document.getElementById('modal-container').innerHTML='';}
function overlayClose(e){if(e.target.classList.contains('modal-overlay'))closeModal();}

// ═════════════════════════════════════════════════════════
// LOADING / EMPTY
// ═════════════════════════════════════════════════════════
function setLoading(on,text=''){const ls=document.getElementById('loading-screen');ls.style.display=on?'flex':'none';if(text)setLoadingText(text);}
function setLoadingText(t){const el=document.getElementById('loading-text');if(el)el.textContent=t;}
function setLoadingBar(pct){const el=document.getElementById('loading-bar');if(el)el.style.width=pct+'%';}
function showEmpty(on){document.getElementById('empty-state').classList.toggle('on',on);}
function setEmptyMsg(msg){const el=document.getElementById('empty-msg');if(el)el.textContent=msg;}

// ═════════════════════════════════════════════════════════
// TIZEN
// ═════════════════════════════════════════════════════════
function detectTizen(){
  if(navigator.userAgent.includes('Tizen')||navigator.userAgent.includes('SmartTV')){
    document.body.classList.add('tizen-detected');
    document.getElementById('tv-zoom').style.display='flex';
  }
}

// ═════════════════════════════════════════════════════════
// UTILS
// ═════════════════════════════════════════════════════════
function escHtml(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showToast(msg,ms=2200){
  const t=document.createElement('div');t.className='toast-msg';t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),400);},ms);
}

// ═════════════════════════════════════════════════════════
// INIT
// ═════════════════════════════════════════════════════════
window.addEventListener('load',async()=>{
  detectTizen();
  updateDots();

  // If user has watched items but no order saved yet, seed order from watchedSet
  if(watchedOrder.length===0&&watchedSet.size>0){
    watchedOrder=[...watchedSet];
    saveWatched();
  }

  // Default nav mode on touch
  if(window.matchMedia('(hover:none) and (pointer:coarse)').matches) setMode('nav');

  applyTransform(true);
  renderFilterBar();
  adjustFilterTop();

  if(!getKey()){
    setLoading(false);
    setEmptyMsg('Añade tu API Key de TMDB para empezar');
    showEmpty(true);
    showToast('Añade tu API Key de TMDB →',4000);
    setTimeout(()=>openKeyModal(),700);
    return;
  }
  await loadMovies();
});
</script>
