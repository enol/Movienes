<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>MOVIE · NES</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0ede8;--bg2:#e8e4de;--text:#1a1a1a;--text-muted:#888;
  --accent:#e63946;--accent2:#457b9d;--border:#d5d0c9;
  --shadow:0 2px 12px rgba(0,0,0,.10);--shadow-lg:0 8px 32px rgba(0,0,0,.16);
  --tw:108px;--th:161px;--gap:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);overflow-x:hidden;}

/* ── TOPBAR ── */
#topbar{position:fixed;top:0;left:0;right:0;z-index:1000;background:#1a1a1a;border-bottom:2px solid var(--accent);display:flex;flex-direction:column;}
#topbar-main{display:flex;align-items:center;gap:10px;padding:0 16px;height:52px;white-space:nowrap;overflow:hidden;}
#topbar h1{font-family:'Bebas Neue',sans-serif;font-size:24px;color:#fff;letter-spacing:3px;flex-shrink:0;}
#topbar h1 .sep{color:var(--accent);margin:0 1px;}
#topbar-controls{display:flex;align-items:center;gap:8px;flex-wrap:nowrap;overflow:hidden;flex:1;}
#topbar-menu-btn{display:none;background:none;border:none;color:#aaa;font-size:20px;cursor:pointer;padding:4px 6px;margin-left:auto;flex-shrink:0;}
#topbar-drawer{display:none;flex-direction:column;gap:8px;background:#1a1a1a;padding:10px 16px 14px;border-top:1px solid #2a2a2a;}
#topbar-drawer.open{display:flex;}
.drawer-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.topbar-key-btn{background:#2a2a2a;border:1px solid #555;color:#ccc;font-size:11px;padding:5px 10px;border-radius:4px;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:5px;transition:background .15s;flex-shrink:0;}
.topbar-key-btn:hover{background:#383838;}
.topbar-key-btn .dot{width:7px;height:7px;border-radius:50%;background:#555;flex-shrink:0;}
.topbar-key-btn.has-key .dot{background:#4caf50;}
.topbar-btn{background:var(--accent);color:#fff;border:none;padding:6px 12px;border-radius:4px;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:600;cursor:pointer;flex-shrink:0;transition:background .2s;}
.topbar-btn:hover{background:#c1121f;}
.topbar-btn.secondary{background:#2a2a2a;border:1px solid #444;}
.topbar-btn.secondary:hover{background:#3a3a3a;}
#title-search-wrap{position:relative;flex-shrink:0;}
#title-search{background:#2a2a2a;border:1px solid #444;color:#fff;font-size:11px;padding:5px 10px 5px 28px;border-radius:4px;width:150px;font-family:'DM Sans',sans-serif;outline:none;}
#title-search::placeholder{color:#666;}
#title-search:focus{border-color:#888;}
#zoom-tb{-webkit-appearance:none;width:80px;height:3px;border-radius:2px;background:#444;outline:none;cursor:pointer;flex-shrink:0;}
#zoom-tb::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--accent2);cursor:pointer;}
#zoom-tb-val{color:#666;font-size:10px;min-width:28px;flex-shrink:0;}
.fb-label{color:#666;font-size:10px;flex-shrink:0;white-space:nowrap;align-self:center;}
.anime-chip{border-color:#7b68ee !important;color:#9d8fef;}
.anime-chip.active{background:#4b3db0 !important;border-color:#7b68ee !important;color:#fff;}
#ts-icon{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:#555;pointer-events:none;display:flex;}
#ts-clear{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:none;border:none;color:#666;cursor:pointer;font-size:14px;display:none;line-height:1;padding:0;}
#ts-clear.on{display:block;}
@media(max-width:900px){#topbar-controls{display:none;}#topbar-menu-btn{display:block;}}
@media(min-width:901px){#topbar-drawer{display:none !important;}}

/* ── FILTER BAR ── */
#filter-bar{position:fixed;top:52px;left:0;right:0;z-index:999;background:#1a1a1a;border-bottom:1px solid #2a2a2a;padding:4px 16px 6px;display:flex;flex-direction:column;gap:4px;}
.fb-row1{display:flex;align-items:center;gap:6px;flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;min-height:30px;}
.fb-row1::-webkit-scrollbar{display:none;}
.fb-row2,.fb-row3{display:flex;align-items:center;gap:4px;flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;min-height:28px;}
.fb-row2::-webkit-scrollbar,.fb-row3::-webkit-scrollbar{display:none;}
.filter-chip{background:#2a2a2a;color:#aaa;border:1px solid #3a3a3a;padding:3px 10px;border-radius:20px;font-size:11px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s;white-space:nowrap;-webkit-tap-highlight-color:transparent;}
.filter-chip:hover{background:#333;color:#ddd;}
.filter-chip.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.filter-toggle-btn{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s;border:1.5px solid #444;background:#2a2a2a;color:#666;flex-shrink:0;-webkit-tap-highlight-color:transparent;}
.filter-toggle-btn.on{border-color:#4caf50;color:#4caf50;background:#1a2a1a;}
.filter-toggle-btn:hover{border-color:#777;color:#ccc;}
.mode-chip{background:#3a3a3a;color:#aaa;border:1px solid #555;padding:3px 11px;border-radius:20px;font-size:11px;font-family:'DM Sans',sans-serif;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;-webkit-tap-highlight-color:transparent;}
.mode-chip:hover{background:#484848;color:#ddd;}
.mode-chip.active-new{background:#2a3d2a;color:#6fcf6f;border-color:#4caf50;}
.mode-chip.active-watched{background:#2a2a3d;color:#7b9fd4;border-color:#457b9d;}
.mode-chip.active-discarded{background:#3d2a2a;color:#d47b7b;border-color:#9d4545;}
.filter-sep{width:1px;height:18px;background:#333;flex-shrink:0;}
/* Era slider */
#era-wrap{display:flex;align-items:center;gap:8px;flex-shrink:0;}
#era-label{color:#888;font-size:11px;white-space:nowrap;}
.era-slider-wrap{position:relative;width:120px;height:20px;flex-shrink:0;}
#era-track{position:absolute;top:50%;left:0;right:0;height:3px;transform:translateY(-50%);background:#333;border-radius:2px;}
#era-fill{position:absolute;top:50%;height:3px;transform:translateY(-50%);background:var(--accent2);border-radius:2px;}
.era-thumb{position:absolute;top:50%;width:14px;height:14px;border-radius:50%;background:var(--accent2);border:2px solid #fff;transform:translate(-50%,-50%);cursor:pointer;z-index:2;-webkit-tap-highlight-color:transparent;}
#era-range-label{color:#aaa;font-size:11px;min-width:80px;flex-shrink:0;}
.filter-clear{background:none;color:var(--accent);border:1px solid var(--accent);padding:3px 10px;border-radius:20px;font-size:11px;font-family:'DM Sans',sans-serif;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;margin-left:auto;-webkit-tap-highlight-color:transparent;}
.filter-clear:hover{background:#fff0f1;}

/* ── MAIN CONTENT (scrollable) ── */
#main-content{padding-top:var(--header-h,92px);padding-left:16px;padding-right:16px;padding-bottom:60px;min-height:100vh;}
#movie-grid{display:flex;flex-wrap:wrap;gap:var(--gap);align-content:flex-start;padding-top:14px;}
#load-sentinel{height:1px;margin-top:20px;}

/* ── MOVIE CARD ── */
.movie-card{position:relative;width:var(--tw);flex-shrink:0;user-select:none;-webkit-tap-highlight-color:transparent;}
.card-img-wrap{position:relative;width:var(--tw);height:var(--th);border-radius:6px;overflow:hidden;background:var(--bg2);}
.card-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
.card-no-poster{width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:8px;text-align:center;background:#d1cdc7;}
.card-no-poster span{font-size:11px;font-weight:700;color:#555;line-height:1.3;word-break:break-word;}

/* corner buttons */
.cb{position:absolute;z-index:10;width:26px;height:20px;background:rgba(0,0,0,.62);border:none;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:1;-webkit-tap-highlight-color:transparent;}

.cb svg{width:11px;height:11px;display:block;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
/* positions */
.cb-tl{top:5px;left:5px;}
.cb-tr{top:5px;right:5px;}
.cb-bl{bottom:5px;left:5px;}
.cb-br{bottom:5px;right:5px;}
/* rating top-left — text not icon */
.cb-rating{background:rgba(0,0,0,.75);color:#f5c518;font-size:10px;font-weight:700;font-family:'DM Sans',sans-serif;gap:3px;line-height:1;}
/* watched green */
.cb-check.watched{background:rgba(76,175,80,.8);}
/* discard red */
.cb-discard{background:rgba(0,0,0,.62);}
.cb-discard.discarded{background:rgba(200,30,30,.8);}
/* filmaffinity icon btn */
.cb-fa{background:rgba(0,0,0,.62);padding:0;overflow:hidden;}
.cb-fa img{width:20px;height:20px;object-fit:cover;display:block;border-radius:3px;}

/* action overlay (3 buttons on check click) */
.card-action-overlay{position:absolute;inset:0;background:rgba(15,15,15,.88);border-radius:6px;display:none;flex-direction:column;align-items:center;justify-content:center;gap:5px;z-index:20;padding:6px;}
.card-action-overlay.open{display:flex;}
.cao-btn{width:80%;padding:5px 0;border:none;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;text-align:center;-webkit-tap-highlight-color:transparent;}
.cao-quarantine{background:#c0392b;color:#fff;}
.cao-quarantine:hover{background:#e74c3c;}
.cao-watched{background:#27ae60;color:#fff;}
.cao-watched:hover{background:#2ecc71;}
.cao-cancel{background:#1a1a1a;color:#aaa;border:1px solid #444;}
.cao-cancel:hover{background:#2a2a2a;}

/* overlays */
.card-watched-overlay{position:absolute;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;border-radius:6px;pointer-events:none;}
.card-watch-tick{font-size:52px;color:#4caf50;text-shadow:0 2px 12px rgba(76,175,80,.5);line-height:1;}
.card-discarded-overlay{position:absolute;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;border-radius:6px;pointer-events:none;}
.card-discard-x{font-size:52px;color:#e63946;text-shadow:0 2px 12px rgba(230,57,70,.5);line-height:1;font-weight:700;}

/* card info */
.card-info{margin-top:5px;}
.card-title{font-size:11px;font-weight:700;line-height:1.3;color:var(--text);word-break:break-word;}
.card-meta{font-size:10px;color:var(--text-muted);margin-bottom:3px;}
.card-platforms{display:flex;flex-wrap:wrap;gap:2px;align-items:center;width:var(--tw);overflow:hidden;margin-top:2px;}
.platform-pill{display:inline-flex;align-items:center;gap:2px;background:#f2efea;border:1px solid var(--border);border-radius:3px;padding:1px 4px;font-size:9px;font-weight:600;color:#555;max-width:calc(var(--tw) - 4px);overflow:hidden;flex-shrink:1;min-width:0;}
.platform-pill img{width:11px;height:11px;object-fit:contain;flex-shrink:0;}
.platform-pill span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ── EMPTY STATE ── */
#empty-state{display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:#aaa;text-align:center;padding:60px 40px;}
#empty-state.on{display:flex;}
#empty-state svg{opacity:.3;}
#empty-state h3{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:#bbb;}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:2000;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal-box{background:#fff;border-radius:12px;padding:24px;width:100%;max-width:480px;box-shadow:var(--shadow-lg);animation:modalIn .18s ease;position:relative;max-height:90vh;overflow-y:auto;}
@keyframes modalIn{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
.modal-box h2{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;margin-bottom:12px;}
.modal-close-x{position:absolute;top:14px;right:16px;background:none;border:none;font-size:20px;color:var(--text-muted);cursor:pointer;}
.modal-close-x:hover{color:var(--text);}
.modal-input{width:100%;border:1.5px solid var(--border);border-radius:6px;padding:9px 12px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;}
.modal-input:focus{border-color:var(--accent2);}
.modal-actions{display:flex;gap:8px;margin-top:14px;justify-content:flex-end;}
.btn-primary{background:var(--accent);color:#fff;border:none;padding:8px 20px;border-radius:6px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:700;cursor:pointer;}
.btn-primary:hover{background:#c1121f;}
.btn-cancel{background:none;border:1.5px solid var(--border);color:var(--text);padding:8px 16px;border-radius:6px;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;}
.btn-cancel:hover{background:var(--bg2);}
/* info modal */
.info-inner{display:flex;gap:14px;}
.info-poster{object-fit:cover;border-radius:7px;background:var(--bg2);display:block;}
.info-body{flex:1;min-width:0;}
.info-badges{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.info-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px;}
.info-badge.year{background:#eee;color:#666;}
.info-badge.tmdb{background:#e3f7ff;color:#0077a8;}
.info-badge.genre{background:#f0ede8;color:#888;border:1px solid var(--border);}
.info-plats{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.info-plat{display:inline-flex;align-items:center;gap:4px;background:#f5f2ee;border:1px solid var(--border);border-radius:4px;padding:2px 7px;font-size:10px;color:#555;}
.info-plat img{width:13px;height:13px;object-fit:contain;border-radius:2px;}
.info-synopsis{font-size:12px;color:#777;line-height:1.6;}
.info-director{font-size:12px;color:#666;margin-bottom:6px;}
.info-cast{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
.cast-item{display:flex;flex-direction:column;align-items:center;gap:3px;width:52px;}
.cast-photo{width:44px;height:44px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--bg2);}
.cast-no-photo{display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#999;background:var(--bg2);}
.cast-name{font-size:9px;color:#777;text-align:center;line-height:1.2;word-break:break-word;}
.modal-box.info-wide{max-width:640px;}
.info-poster{width:130px;min-width:130px;height:195px;}
/* github steps */
.key-steps{margin-bottom:12px;display:flex;flex-direction:column;}
.key-step{font-size:12px;color:#555;line-height:1.6;display:flex;gap:12px;align-items:flex-start;padding:8px 0;border-bottom:1px solid #eee;}
.key-step:last-child{border-bottom:none;}
.key-step-num{background:var(--accent);color:#fff;border-radius:50%;width:20px;height:20px;min-width:20px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:2px;}
.key-step-body{flex:1;}
.key-step a{color:var(--accent2);}
.key-visible{font-family:monospace;font-size:11px;letter-spacing:.3px;}
.modal-tabs{display:flex;gap:0;margin-bottom:18px;border-bottom:2px solid var(--border);}
.modal-tab{padding:7px 18px;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;border:none;background:none;color:var(--text-muted);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;}
.modal-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.modal-tab-content{display:none;}
.modal-tab-content.active{display:block;}

/* ── SPINNER / LOADING ── */
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
#loading-screen{position:fixed;inset:0;z-index:5000;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
#loading-screen h2{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:3px;color:var(--accent);}
#loading-screen p{color:var(--text-muted);font-size:13px;}
#loading-progress{width:200px;height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:4px;}
#loading-bar{width:0%;height:100%;background:var(--accent);border-radius:2px;transition:width .3s;}
#load-more-indicator{text-align:center;padding:16px;color:var(--text-muted);font-size:12px;display:none;}
#load-more-indicator.on{display:block;}

/* ── TOAST ── */
.toast-msg{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;z-index:9999;transition:opacity .4s;font-family:'DM Sans',sans-serif;white-space:nowrap;}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  #topbar-main{height:48px !important;padding:0 10px !important;}
  #topbar h1{font-size:18px;}
  #topbar-controls{display:none !important;}
  #topbar-menu-btn{display:flex !important;margin-left:auto;}
  #topbar-drawer{position:fixed;top:48px;left:0;right:0;z-index:999;max-height:70vh;overflow-y:auto;}
  #filter-bar{top:48px !important;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;gap:6px;padding:6px 10px;scrollbar-width:none;}
  #filter-bar::-webkit-scrollbar{display:none;}
  .modal-overlay{padding:0;align-items:flex-end;}
  .modal-box{border-radius:16px 16px 0 0 !important;max-width:100% !important;width:100% !important;max-height:88vh !important;overflow-y:auto !important;padding:20px 16px 28px;}
  .modal-box::before{content:'';display:block;width:40px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 14px;}
  .info-inner{flex-direction:column;}
  .info-poster{width:70px;min-width:70px;height:105px;}
}
@media(hover:none) and (pointer:coarse){
  #filter-bar{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;gap:6px;padding:6px 10px;scrollbar-width:none;}
  #filter-bar::-webkit-scrollbar{display:none;}
  .cb{opacity:1 !important;}
}
button,.movie-card,.filter-chip,.platform-pill{touch-action:manipulation;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg2);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>

<!-- TOPBAR -->
<div id="topbar">
  <div id="topbar-main">
    <h1>MOVIE<span class="sep"> · </span>NES</h1>
    <div id="topbar-controls">
      <button class="topbar-key-btn" id="tmdb-btn" onclick="openKeyModal()">
        <span class="dot" id="tmdb-dot"></span> TMDB
      </button>
      <button class="topbar-btn secondary" onclick="reloadAll()" title="Recargar">↻</button>
      <input type="range" id="zoom-tb" min="60" max="200" value="108" step="4" oninput="onZoomChange(this.value)" title="Zoom carátulas">
      <span id="zoom-tb-val">108</span>
      <div id="title-search-wrap">
        <span id="ts-icon"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg></span>
        <input id="title-search" type="text" placeholder="Buscar título…" oninput="onTitleSearch(this.value)" onfocus="this.style.borderColor='#888'" onblur="this.style.borderColor='#444'">
        <button id="ts-clear" onclick="clearSearch()">✕</button>
      </div>
      <div id="era-topbar" style="display:flex;align-items:center;gap:6px;flex-shrink:0;">
        <span style="color:#666;font-size:10px;white-space:nowrap">Época:</span>
        <div class="era-slider-wrap" id="era-slider-wrap" style="width:100px;"><div id="era-track"></div><div id="era-fill"></div><div class="era-thumb" id="era-thumb-min" onmousedown="startEraThumb(event,'min')" ontouchstart="startEraThumb(event,'min')"></div><div class="era-thumb" id="era-thumb-max" onmousedown="startEraThumb(event,'max')" ontouchstart="startEraThumb(event,'max')"></div></div>
        <span id="era-range-label" style="color:#888;font-size:10px;min-width:72px;white-space:nowrap">1950 — 2026</span>
      </div>
    </div>
    <button id="topbar-menu-btn" onclick="toggleDrawer()">☰</button>
  </div>
  <div id="topbar-drawer">
    <div class="drawer-row" style="justify-content:space-between;padding:4px 0 8px">
      <span style="font-family:'Bebas Neue',sans-serif;font-size:16px;color:#fff;letter-spacing:1px">Config</span>
      <button onclick="toggleDrawer()" style="background:none;border:none;color:#aaa;font-size:18px;cursor:pointer">✕</button>

async function tmdbGet(path){
  const key=getKey();if(!key)return null;
  const sep=path.includes('?')?'&':'?';
  try{
    const ctrl=new AbortController();setTimeout(()=>ctrl.abort(),9000);
    const r=await fetch(`${TMDB_BASE}${path}${sep}api_key=${key}`,{signal:ctrl.signal});
    if(!r.ok)return null;return await r.json();
  }catch{return null;}
}

// Genre name → IDs lookup for movie and tv
const MOVIE_GENRE_IDS=Object.fromEntries(Object.entries(MOVIE_GENRES).map(([id,name])=>[name,id]));
const TV_GENRE_IDS=Object.fromEntries(Object.entries(TV_GENRES).map(([id,name])=>[name,id]));

function buildDiscoverUrl(mediaType,page,forNew){
  const isNew=forNew||viewMode==='new';
  const sort=(activeGenres.size>0&&!isNew)?'vote_average.desc':'release_date.desc';
  const voteMin=sort==='vote_average.desc'?'&vote_count.gte=20':'&vote_count.gte=5';
  // Anime special: keyword 210024 + genre 16 (Animation)
  const isAnime=activeGenres.has('Anime');
  const otherGenres=[...activeGenres].filter(g=>g!=='Anime');
  const gidMap=mediaType==='tv'?TV_GENRE_IDS:MOVIE_GENRE_IDS;
  const genreIds=otherGenres.map(g=>gidMap[g]).filter(Boolean);
  if(isAnime&&!genreIds.includes('16'))genreIds.push('16');
  const genreParam=genreIds.length>0?`&with_genres=${[...new Set(genreIds)].join(',')}`:'';
  const animeParam=isAnime?'&with_keywords=210024':'';
  // Provider: get all numeric IDs for selected provider ids (there can be duplicates like prime=9,119)
  const provIds=[];
  if(activeProviders.size>0){
    [...activeProviders].forEach(pid=>{
      Object.entries(PROVIDER_MAP).forEach(([numId,p])=>{if(p.id===pid&&!provIds.includes(numId))provIds.push(numId);});
    });
  }
  const provParam=provIds.length>0?`&with_watch_providers=${provIds.join('|')}`:'';
  const eraParam=`&primary_release_date.gte=${eraMin}-01-01&primary_release_date.lte=${eraMax}-12-31`;
  const tvEra=`&first_air_date.gte=${eraMin}-01-01&first_air_date.lte=${eraMax}-12-31`;
  if(mediaType==='movie'){
    return `/discover/movie?language=es-ES&region=ES&sort_by=${sort}${voteMin}&vote_average.gte=5&watch_region=ES&with_watch_monetization_types=flatrate&with_watch_provider_regions=ES&include_adult=false&page=${page}${genreParam}${animeParam}${provParam}${eraParam}`;
  } else {
    const tvSort=sort==='vote_average.desc'?'vote_average.desc':'first_air_date.desc';
    return `/discover/tv?language=es-ES&sort_by=${tvSort}&vote_count.gte=10&vote_average.gte=5&watch_region=ES&with_watch_monetization_types=flatrate&with_watch_provider_regions=ES&include_adult=false&page=${page}${genreParam}${animeParam}${provParam}${tvEra}`;
  }
}

async function fetchPageItems(page,forNew){
  const types=mediaTypeFilter?[mediaTypeFilter]:['movie','tv'];
  let results=[];
  let maxTP=1;
  for(const t of types){
    const url=buildDiscoverUrl(t,page,forNew);
    const d=await tmdbGet(url);
    if(d){
      const tp=Math.max(1,Math.min(d.total_pages||1,500));
      if(tp>maxTP)maxTP=tp; // keep highest total_pages across types
      (d.results||[]).filter(x=>x.poster_path).forEach(x=>{x._mediaType=t;results.push(x);});
    }
  }
  totalPages=maxTP;
  // Sort by vote_average desc if genre filtered, else by date desc
  if(activeGenres.size>0&&!forNew) results.sort((a,b)=>(b.vote_average||0)-(a.vote_average||0));
  else results.sort((a,b)=>{
    const da=(a.release_date||a.first_air_date||'');
    const db=(b.release_date||b.first_air_date||'');
    return db.localeCompare(da);
  });
  return results;
}

async function fetchProviders(tmdbId,mediaType){
  const t=mediaType==='tv'?'tv':'movie';
  const d=await tmdbGet(`/${t}/${tmdbId}/watch/providers`);if(!d)return[];
  const region=d.results?.ES||{};
  const out=[],seen=new Set();
  (region.flatrate||[]).forEach(p=>{
    if(/channel|addon|with ads/i.test(p.provider_name))return;
    const mapped=PROVIDER_MAP[p.provider_id];
    const pid=mapped?.id||('p'+p.provider_id);
    if(seen.has(pid))return;seen.add(pid);
    const logo=p.logo_path?'https://image.tmdb.org/t/p/w45'+p.logo_path:(mapped?pLogo(mapped):'');
    out.push({id:pid,name:mapped?.name||p.provider_name,logo});
  });
  return out;
}

// ── LOAD / INFINITE SCROLL ──
async function loadMovies(reset){
  if(!getKey()){setLoading(false);showEmpty('Añade tu API Key de TMDB para empezar');return;}
  if(isLoadingMore&&!reset) return;
  if(reset){
    _loadingAbort=false;currentPage=1;totalPages=999;allItems=[];_searchResults=[];
    clearGrid();setLoading(true,'Cargando…');setLoadingBar(0);
  }
  isLoadingMore=true;
  const isNew=viewMode==='new';
  let allFetched=[];
  if(reset){
    // Always fetch page 1 first so totalPages is known, then pages 2-4 in parallel
    const first=await fetchPageItems(1,isNew);
    if(_loadingAbort){isLoadingMore=false;return;}
    allFetched.push(...first);
    if(totalPages>=2){
      const extraPages=[2,3,4].filter(p=>p<=totalPages);
      const extra=await Promise.all(extraPages.map(pg=>fetchPageItems(pg,isNew)));
      if(_loadingAbort){isLoadingMore=false;return;}
      extra.forEach(b=>allFetched.push(...b));
    }
    currentPage=Math.min(5,totalPages+1);
  } else {
    if(currentPage>totalPages){isLoadingMore=false;return;}
    const batch=await fetchPageItems(currentPage,isNew);
    if(_loadingAbort){isLoadingMore=false;return;}
    allFetched.push(...batch);
    currentPage++;
  }
  if(_loadingAbort){isLoadingMore=false;return;}
  // Sort combined results
  if(activeGenres.size>0&&!isNew) allFetched.sort((a,b)=>(b.vote_average||0)-(a.vote_average||0));
  else allFetched.sort((a,b)=>{const da=a.release_date||a.first_air_date||'';const db=b.release_date||b.first_air_date||'';return db.localeCompare(da);});
  // Deduplicate
  const seen=new Set(allItems.map(x=>String(x.id)));
  const toShow=allFetched.filter(x=>!seen.has(String(x.id))&&!discardedSet.has(String(x.id))&&!watchedSet.has(String(x.id)));
  allItems=[...allItems,...toShow];
  setLoadingBar(80);
  // Load providers for first batch
  const bsz=Math.min(12,toShow.length);
  await Promise.all(toShow.slice(0,bsz).map(async m=>{m._providers=await fetchProviders(m.id,m._mediaType);}));
  setLoading(false);
  if(!allItems.length&&reset){showEmpty('Sin resultados para este filtro');isLoadingMore=false;return;}
  hideEmpty();
  appendCards(toShow);
  isLoadingMore=false;
  // Background: rest of providers
  (async()=>{
    for(let i=bsz;i<toShow.length;i++){
      if(_loadingAbort)return;
      toShow[i]._providers=await fetchProviders(toShow[i].id,toShow[i]._mediaType);
      const el=document.querySelector(`.movie-card[data-id="${toShow[i].id}"] .card-platforms`);
      if(el)el.innerHTML=renderPlatformPills(toShow[i]);
    }
    // Lazy runtime/seasons for all
    for(const m of toShow){
      if(_loadingAbort)return;
      if(m._enriched)continue;m._enriched=true;
      const t=m._mediaType==='tv'?'tv':'movie';
      const d=await tmdbGet(`/${t}/${m.id}?language=es-ES`);
      if(d){
        if(m._mediaType==='tv'){m._seasons=d.number_of_seasons||null;m._overview=d.overview||'';}
        else{m._runtime=d.runtime||null;m._overview=d.overview||'';}
        m._originalTitle=d.original_title||d.original_name||m.title||m.name;
      }
      const metaEl=document.querySelector(`.movie-card[data-id="${m.id}"] .card-meta`);
      if(metaEl)metaEl.textContent=buildMeta(m);
    }
  })();
}

async function reloadAll(){
  _loadingAbort=true;
  await new Promise(r=>setTimeout(r,80));
  _loadingAbort=false;
  if(viewMode==='watched')loadWatchedItems();
  else if(viewMode==='discarded')loadDiscardedItems();
  else loadMovies(true);
}

// Infinite scroll via IntersectionObserver
const sentinel=document.getElementById('load-sentinel');
const observer=new IntersectionObserver(entries=>{
  const canLoad=entries[0].isIntersecting
    &&!isLoadingMore
    &&viewMode!=='watched'
    &&viewMode!=='discarded'
    &&currentPage<=totalPages
    &&!searchQuery;
  if(canLoad){
    document.getElementById('load-more-indicator').classList.add('on');
    loadMovies(false).then(()=>document.getElementById('load-more-indicator').classList.remove('on'));
  }
},{rootMargin:'600px'});
observer.observe(sentinel);

let _specialCache=[];

async function loadWatchedItems(){
  if(!watchedOrder.length){setLoading(false);showEmpty('No has marcado ninguna película como vista todavía');return;}
  _loadingAbort=false;allItems=[];clearGrid();setLoading(true,'Cargando vistas…');setLoadingBar(0);
  const ids=[...watchedOrder].reverse().slice(0,100);
  await loadSpecialItems(ids,'vistas');
}

async function loadDiscardedItems(){
  if(!discardedOrder.length){setLoading(false);showEmpty('No has descartado ninguna película todavía');return;}
  _loadingAbort=false;allItems=[];clearGrid();setLoading(true,'Cargando cuarentena…');setLoadingBar(0);
  const ids=[...discardedOrder].reverse().slice(0,100);
  await loadSpecialItems(ids,'cuarentena');
}

async function loadSpecialItems(ids,label){
  const results=[];
  for(let i=0;i<ids.length;i++){
    if(_loadingAbort)return;
    setLoadingBar(Math.round(i/ids.length*70));
    const id=ids[i];
    let m=_specialCache.find(x=>String(x.id)===id);
    if(!m){
      // Try movie first then tv
      let d=await tmdbGet(`/movie/${id}?language=es-ES`);
      let mt='movie';
      if(!d||!d.poster_path){d=await tmdbGet(`/tv/${id}?language=es-ES`);mt='tv';}
      if(d&&d.poster_path){
        m={id:d.id,title:d.title||d.name,name:d.name,release_date:d.release_date,first_air_date:d.first_air_date,poster_path:d.poster_path,vote_average:d.vote_average,genre_ids:(d.genres||[]).map(g=>g.id),_runtime:d.runtime,_seasons:d.number_of_seasons,_overview:d.overview,_originalTitle:d.original_title||d.original_name,_mediaType:mt,_enriched:true};
        _specialCache.push(m);
      }
    }
    if(m)results.push(m);
  }
  setLoadingBar(75);
  const bsz=Math.min(10,results.length);
  await Promise.all(results.slice(0,bsz).map(async m=>{if(!m._providers)m._providers=await fetchProviders(m.id,m._mediaType);}));
  setLoadingBar(100);
  allItems=results;
  setLoading(false);
  if(!results.length){showEmpty('Sin resultados');return;}
  hideEmpty();appendCards(results);isLoadingMore=false;
  (async()=>{for(let i=bsz;i<results.length;i++){if(_loadingAbort)return;if(!results[i]._providers)results[i]._providers=await fetchProviders(results[i].id,results[i]._mediaType);const el=document.querySelector(`.movie-card[data-id="${results[i].id}"] .card-platforms`);if(el)el.innerHTML=renderPlatformPills(results[i]);}})();
}

let _searchDb;
function onTitleSearch(val){
  document.getElementById('title-search').value=val;
  const d=document.getElementById('title-search-drawer');if(d)d.value=val;
  document.getElementById('ts-clear').className=val?'on':'';
  clearTimeout(_searchDb);
  _searchDb=setTimeout(()=>{
    searchQuery=val.toLowerCase().trim();
    if(!searchQuery){_searchResults=[];reloadAll();return;}
    doSearch(searchQuery);
  },350);
}
function clearSearch(){document.getElementById('title-search').value='';searchQuery='';_searchResults=[];document.getElementById('ts-clear').className='';reloadAll();}

async function doSearch(q){
  _loadingAbort=false;clearGrid();setLoading(true,'Buscando…');setLoadingBar(0);
  const types=mediaTypeFilter?[mediaTypeFilter]:['movie','tv'];
  let results=[];
  for(const t of types){
    const endpoint=t==='tv'?'tv':'movie';
    const d=await tmdbGet(`/search/${endpoint}?query=${encodeURIComponent(q)}&language=es-ES&include_adult=false&page=1`);
    if(d)(d.results||[]).filter(x=>x.poster_path&&(x.vote_average||0)>=4).forEach(x=>{x._mediaType=t;results.push(x);});
  }
  results.sort((a,b)=>(b.vote_average||0)-(a.vote_average||0));
  allItems=results;setLoadingBar(60);
  const bsz=Math.min(10,results.length);
  await Promise.all(results.slice(0,bsz).map(async m=>{m._providers=await fetchProviders(m.id,m._mediaType);}));
  setLoading(false);
  if(!results.length){showEmpty('Sin resultados para "'+q+'"');return;}
  hideEmpty();appendCards(results);
  (async()=>{for(let i=bsz;i<results.length;i++){if(_loadingAbort)return;results[i]._providers=await fetchProviders(results[i].id,results[i]._mediaType);const el=document.querySelector(`.movie-card[data-id="${results[i].id}"] .card-platforms`);if(el)el.innerHTML=renderPlatformPills(results[i]);}})();
}

  const eyeSvg=`<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;

  // Media type
  const mtHtml=`<div style="display:flex;gap:4px">
    <button class="filter-chip${mediaTypeFilter===null?' active':''}" onclick="setMediaType(null)">Todo</button>
    <button class="filter-chip${mediaTypeFilter==='movie'?' active':''}" onclick="setMediaType('movie')">🎬 Pelis</button>

  </div>`;

  // Platforms
  const platHtml=PICKER_PLATFORMS.map(p=>`<button class="filter-chip${activeProviders.has(p.id)?' active':''}" onclick="toggleProvider('${p.id}')">${escHtml(p.name)}</button>`).join('');

  // Genres (combined) — Anime special chip first
  const allGenres={...MOVIE_GENRES,...TV_GENRES};
  const uniq=[...new Set(Object.values(allGenres))].sort();
  const animeActive=activeGenres.has('Anime');
  const animeChip=`<button class="filter-chip anime-chip${animeActive?' active':''}" onclick="toggleGenre('Anime')">🎌 Anime</button>`;
  const genreHtml=animeChip+uniq.map(g=>`<button class="filter-chip${activeGenres.has(g)?' active':''}" onclick="toggleGenre('${escHtml(g)}')">${escHtml(g)}</button>`).join('');



  // View modes
  const newCls=viewMode==='new'?'mode-chip active-new':'mode-chip';
  const watchedCls=viewMode==='watched'?'mode-chip active-watched':'mode-chip';
  const discardedCls=viewMode==='discarded'?'mode-chip active-discarded':'mode-chip';
  const viewModeHtml=`<div style="display:flex;gap:4px">
    <button class="${newCls}" onclick="toggleViewMode('new')">🆕 NEW</button>
    <button class="${watchedCls}" onclick="toggleViewMode('watched')">✓ VISTAS</button>
    <button class="${discardedCls}" onclick="toggleViewMode('discarded')">✕ CUARENTENA</button>
  </div>`;

  const hasActive=mediaTypeFilter||activeProviders.size||activeGenres.size||eraMin>MIN_YEAR||eraMax<MAX_YEAR||viewMode;

  bar.innerHTML=`
    <div class="fb-row1">
      ${mtHtml}
      <div class="filter-sep"></div>
      ${viewModeHtml}
      <div class="filter-sep"></div>
      <button class="filter-toggle-btn ${showPlatforms?'on':'off'}" onclick="toggleShowPlatforms()">${eyeSvg} Plataformas</button>
      <button class="filter-toggle-btn ${showRatings?'on':'off'}" onclick="toggleShowRatings()">${starSvg} Nota</button>
      ${hasActive?`<button class="filter-clear" onclick="clearFilters()">✕ Limpiar</button>`:''}
    </div>
    <div class="fb-row2"><button class="filter-toggle-btn ${showPlatforms?'on':'off'}" onclick="toggleShowPlatforms()" style="flex-shrink:0">${eyeSvg} Plataformas</button><div class="filter-sep" style="height:16px;margin:0 4px"></div>${platHtml}</div>
    <div class="fb-row3"><span class="fb-label">Géneros:</span>${genreHtml}</div>
  `;
  updateEraSlider();
}

function toggleProvider(pid){
  if(activeProviders.has(pid))activeProviders.delete(pid);else activeProviders.add(pid);
  viewMode=null;renderFilterBar();loadMovies(true);
}
function toggleGenre(g){
  if(activeGenres.has(g))activeGenres.delete(g);else activeGenres.add(g);
  viewMode=null;renderFilterBar();loadMovies(true);
}
function toggleViewMode(mode){
  if(viewMode===mode){viewMode=null;renderFilterBar();loadMovies(true);return;}
  viewMode=mode;renderFilterBar();
  if(mode==='watched')loadWatchedItems();
  else if(mode==='discarded')loadDiscardedItems();

}

let _eraThumbActive=null;
function updateEraSlider(){
  const wrap=document.getElementById('era-slider-wrap');if(!wrap)return;
  const total=MAX_YEAR-MIN_YEAR;
  const minPct=(eraMin-MIN_YEAR)/total*100;
  const maxPct=(eraMax-MIN_YEAR)/total*100;
  const fill=document.getElementById('era-fill');if(fill){fill.style.left=minPct+'%';fill.style.width=(maxPct-minPct)+'%';}
  const tmin=document.getElementById('era-thumb-min');if(tmin)tmin.style.left=minPct+'%';
  const tmax=document.getElementById('era-thumb-max');if(tmax)tmax.style.left=maxPct+'%';
  const lbl=document.getElementById('era-range-label');if(lbl)lbl.textContent=eraMin+' — '+eraMax;
}
function startEraThumb(e,which){
  e.preventDefault();_eraThumbActive=which;
  const move=ev=>{
    const wrap=document.getElementById('era-slider-wrap');if(!wrap)return;
    const rect=wrap.getBoundingClientRect();
    const clientX=(ev.touches?ev.touches[0].clientX:ev.clientX);
    const pct=Math.max(0,Math.min(1,(clientX-rect.left)/rect.width));
    const year=Math.round(MIN_YEAR+pct*(MAX_YEAR-MIN_YEAR));
    if(which==='min'){eraMin=Math.min(year,eraMax-1);}else{eraMax=Math.max(year,eraMin+1);}
    updateEraSlider();
  };
  const up=()=>{
    document.removeEventListener('mousemove',move);document.removeEventListener('mouseup',up);
    document.removeEventListener('touchmove',move);document.removeEventListener('touchend',up);
    _eraThumbActive=null;
    if(viewMode==='new'){viewMode=null;renderFilterBar();}
    loadMovies(true);
  };
  document.addEventListener('mousemove',move);document.addEventListener('mouseup',up);
  document.addEventListener('touchmove',move,{passive:false});document.addEventListener('touchend',up);
}

// ── RENDER CARDS ──
function buildMeta(m){
  const year=(m.release_date||m.first_air_date||'').slice(0,4);
  if(m._mediaType==='tv'){return year+(m._seasons?` · ${m._seasons} temp.`:'');}
  return year+(m._runtime?` · ${m._runtime} min`:'');
}
function renderPlatformPills(m){
  if(!showPlatforms)return'';
  return(m._providers||[]).map(p=>`<span class="platform-pill">${p.logo?`<img src="${p.logo}" alt="">`:''}<span>${escHtml(p.name)}</span></span>`).join('');
}

const INFO_SVG=`<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" stroke="#fff" fill="none"/><line x1="12" y1="8" x2="12" y2="8" stroke="#fff" stroke-width="3"/><line x1="12" y1="11" x2="12" y2="16" stroke="#fff"/></svg>`;
const CHECK_SVG=`<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12" stroke="#fff"/></svg>`;
const STAR_SVG=`<svg viewBox="0 0 24 24" fill="#f5c518" stroke="none" width="10" height="10"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`;

function appendCards(items){
  const grid=document.getElementById('movie-grid');
  const emptyEl=document.getElementById('empty-state');
  items.forEach(m=>{
    const id=String(m.id);
    if(document.querySelector(`.movie-card[data-id="${id}"]`))return;
    const isWatched=watchedSet.has(id);
    const isDiscarded=discardedSet.has(id);
    const rating=m.vote_average?Math.round(m.vote_average*10)/10:null;
    const year=(m.release_date||m.first_air_date||'').slice(0,4);
    const title=m.title||m.name||'';
    const poster=m.poster_path?IMG185+m.poster_path:'';

    const watchedOv=isWatched?`<div class="card-watched-overlay"><div class="card-watch-tick">✓</div></div>`:'';
    const discardedOv=isDiscarded?`<div class="card-discarded-overlay"><div class="card-discard-x">✕</div></div>`:'';
    const ratingHtml=rating?`<div class="cb cb-tl cb-rating" style="display:${showRatings?'flex':'none'}">${STAR_SVG} ${rating}</div>`:'';

    const card=document.createElement('div');
    card.className='movie-card';card.dataset.id=id;
    card.innerHTML=`
      <div class="card-img-wrap">
        ${poster?`<img src="${poster}" alt="${escHtml(title)}" loading="lazy">`:`<div class="card-no-poster"><span>${escHtml(title)}</span></div>`}
        ${ratingHtml}
        <button class="cb cb-tr cb-check${isWatched?' watched':''}" onclick="event.stopPropagation();openActionOverlay('${id}')" title="Estado">${CHECK_SVG}</button>
        <button class="cb cb-bl" onclick="event.stopPropagation();openInfoModal('${id}')" title="Info">${INFO_SVG}</button>
        <button class="cb cb-br cb-fa" onclick="event.stopPropagation();openFA('${id}')" title="FilmAffinity"><img src="${FA_ICON}" alt="FA"></button>
        ${watchedOv}${discardedOv}
        <div class="card-action-overlay" id="cao-${id}">
          <button class="cao-btn cao-quarantine" onclick="event.stopPropagation();doDiscard('${id}')"> Cuarentena</button>
          <button class="cao-btn cao-watched" onclick="event.stopPropagation();doWatch('${id}')">✓ Vista</button>
          <button class="cao-btn cao-cancel" onclick="event.stopPropagation();closeActionOverlay('${id}')">✕ Salir</button>
        </div>
      </div>
      <div class="card-info">
        <div class="card-title">${escHtml(title)}</div>
        <div class="card-meta">${buildMeta(m)}</div>
        <div class="card-platforms" style="${showPlatforms?'':'display:none'}">${renderPlatformPills(m)}</div>
      </div>`;
    grid.insertBefore(card,emptyEl);
  });
}

function clearGrid(){
  const grid=document.getElementById('movie-grid');
  grid.querySelectorAll('.movie-card').forEach(e=>e.remove());
}

// ── ACTION OVERLAY ──
function openActionOverlay(id){
  document.querySelectorAll('.card-action-overlay.open').forEach(el=>{if(el.id!=='cao-'+id)el.classList.remove('open');});
  document.getElementById('cao-'+id)?.classList.toggle('open');
}
function closeActionOverlay(id){document.getElementById('cao-'+id)?.classList.remove('open');}
document.addEventListener('click',e=>{
  if(!e.target.closest('.movie-card')) document.querySelectorAll('.card-action-overlay.open').forEach(el=>el.classList.remove('open'));
});

function doWatch(id){
  closeActionOverlay(id);
  const sid=String(id);
  if(watchedSet.has(sid)){watchedSet.delete(sid);watchedOrder=watchedOrder.filter(x=>x!==sid);}
  else{watchedSet.add(sid);watchedOrder=watchedOrder.filter(x=>x!==sid);watchedOrder.push(sid);}
  saveWatched();
  refreshCard(sid);
  if(!watchedSet.has(sid)&&viewMode===null) setTimeout(()=>document.querySelector(`.movie-card[data-id="${sid}"]`)?.remove(),60);
}

function doDiscard(id){
  closeActionOverlay(id);
  const sid=String(id);
  if(discardedSet.has(sid)){discardedSet.delete(sid);discardedOrder=discardedOrder.filter(x=>x!==sid);}
  else{
    discardedSet.add(sid);discardedOrder=discardedOrder.filter(x=>x!==sid);discardedOrder.push(sid);
    if(watchedSet.has(sid)){watchedSet.delete(sid);watchedOrder=watchedOrder.filter(x=>x!==sid);saveWatched();}
  }
  saveDiscarded();
  refreshCard(sid);
  if(discardedSet.has(sid)&&viewMode===null) setTimeout(()=>document.querySelector(`.movie-card[data-id="${sid}"]`)?.remove(),60);
  if(!discardedSet.has(sid)&&viewMode==='discarded') document.querySelector(`.movie-card[data-id="${sid}"]`)?.remove();
}

function openFA(id){
  const m=allItems.find(x=>String(x.id)===String(id))||_specialCache.find(x=>String(x.id)===String(id));
  const title=m?._originalTitle||m?.title||m?.name||id;
  window.open(`https://www.filmaffinity.com/es/search.php?stype=title&stext=${encodeURIComponent(title)}`,'_blank');
}

function refreshCard(sid){
  const card=document.querySelector(`.movie-card[data-id="${sid}"]`);if(!card)return;
  const wrap=card.querySelector('.card-img-wrap');
  wrap.querySelectorAll('.card-watched-overlay,.card-discarded-overlay').forEach(e=>e.remove());
  const isWatched=watchedSet.has(sid);const isDiscarded=discardedSet.has(sid);
  if(isWatched){const ov=document.createElement('div');ov.className='card-watched-overlay';ov.innerHTML='<div class="card-watch-tick">✓</div>';const cao=wrap.querySelector('.card-action-overlay');wrap.insertBefore(ov,cao);}
  if(isDiscarded){const ov=document.createElement('div');ov.className='card-discarded-overlay';ov.innerHTML='<div class="card-discard-x">✕</div>';const cao=wrap.querySelector('.card-action-overlay');wrap.insertBefore(ov,cao);}
  const cb=card.querySelector('.cb-check');if(cb)cb.classList.toggle('watched',isWatched);
}

// ── INFO MODAL ──
async function openInfoModal(id){
  const m=allItems.find(x=>String(x.id)===String(id))||_specialCache.find(x=>String(x.id)===String(id));if(!m)return;
  const year=(m.release_date||m.first_air_date||'').slice(0,4);
  const rating=m.vote_average?Math.round(m.vote_average*10)/10:null;
  const poster=m.poster_path?IMG500+m.poster_path:'';
  const genreMap=m._mediaType==='tv'?TV_GENRES:MOVIE_GENRES;
  const genres=(m.genre_ids||[]).map(gid=>genreMap[gid]).filter(Boolean);
  if(!m._providers)m._providers=await fetchProviders(m.id,m._mediaType);
  // Fetch full details + credits
  const t=m._mediaType==='tv'?'tv':'movie';
  if(!m._credsFetched){
    m._credsFetched=true;
    const [detD,credD]=await Promise.all([
      tmdbGet(`/${t}/${m.id}?language=es-ES`),
      tmdbGet(`/${t}/${m.id}/credits?language=es-ES`)
    ]);
    if(detD){m._overview=detD.overview||'';if(m._mediaType==='tv'){m._seasons=detD.number_of_seasons;}else{m._runtime=detD.runtime;}m._originalTitle=detD.original_title||detD.original_name;}
    if(credD){
      const crew=credD.crew||[];
      m._director=crew.filter(x=>x.job==='Director'||x.known_for_department==='Directing'&&x.job==='Director').slice(0,2).map(x=>x.name).join(', ')||'';
      m._createdBy=(detD?.created_by||[]).map(x=>x.name).join(', ')||m._director;
      m._cast=(credD.cast||[]).slice(0,8).map(x=>({name:x.name,photo:x.profile_path?'https://image.tmdb.org/t/p/w45'+x.profile_path:''}));
    }
    const metaEl=document.querySelector(`.movie-card[data-id="${id}"] .card-meta`);if(metaEl)metaEl.textContent=buildMeta(m);
  }
  const director=m._mediaType==='tv'?(m._createdBy||m._director):(m._director||'');
  const cast=m._cast||[];
  const castHtml=cast.length?`<div class="info-cast">${cast.map(a=>`<div class="cast-item">${a.photo?`<img src="${a.photo}" alt="${escHtml(a.name)}" class="cast-photo">`:`<div class="cast-photo cast-no-photo">${escHtml(a.name.charAt(0))}</div>`}<span class="cast-name">${escHtml(a.name)}</span></div>`).join('')}</div>`:'';
  showModal(`
    <button class="modal-close-x" onclick="closeModal()">✕</button>
    <h2 style="font-size:20px;margin-bottom:10px">${escHtml(m.title||m.name||'—')}</h2>
    <div class="info-inner">
      ${poster?`<img class="info-poster" src="${poster}" alt="">`:''}
      <div class="info-body">
        <div class="info-badges">
          ${year?`<span class="info-badge year">${year}</span>`:''}
          ${m._mediaType==='tv'&&m._seasons?`<span class="info-badge year">${m._seasons} temp.</span>`:''}
          ${m._mediaType==='movie'&&m._runtime?`<span class="info-badge year">${m._runtime} min</span>`:''}
          ${rating?`<span class="info-badge tmdb">★ ${rating} TMDB</span>`:''}
          ${genres.map(g=>`<span class="info-badge genre">${escHtml(g)}</span>`).join('')}
        </div>
        ${(m._providers||[]).length?`<div class="info-plats">${(m._providers).map(p=>`<span class="info-plat">${p.logo?`<img src="${p.logo}" alt="">`:'' }${escHtml(p.name)}</span>`).join('')}</div>`:''}
        ${director?`<div class="info-director"><strong>${m._mediaType==='tv'?'Creador':'Director'}:</strong> ${escHtml(director)}</div>`:''}
        ${m._overview?`<div class="info-synopsis">${escHtml(m._overview)}</div>`:''}
      </div>
    </div>
    ${castHtml}
    <div class="modal-actions"><button class="btn-cancel" onclick="closeModal()">Cerrar</button></div>`,'info-wide');
}

// ── KEY MODAL (with GitHub tab) ──
function openKeyModal(){
  const cur=getKey();
  showModal(`
    <button class="modal-close-x" onclick="closeModal()">✕</button>
    <h2>Configuración</h2>
    <div class="modal-tabs">
      <button class="modal-tab active" onclick="switchTab(this,'tab-tmdb')">TMDB API</button>
      <button class="modal-tab" onclick="switchTab(this,'tab-github')">GitHub Pages</button>
    </div>
    <div id="tab-tmdb" class="modal-tab-content active">
      <div class="key-steps">
        <div class="key-step"><span class="key-step-num">1</span><div class="key-step-body">Regístrate gratis en <a href="https://www.themoviedb.org" target="_blank">themoviedb.org</a></div></div>
        <div class="key-step"><span class="key-step-num">2</span><div class="key-step-body">Ve a <a href="https://www.themoviedb.org/settings/api" target="_blank">Ajustes → API</a> y solicita una key tipo <strong>Developer</strong> (personal, gratis).</div></div>
        <div class="key-step"><span class="key-step-num">3</span><div class="key-step-body">Copia la <strong>API Key (v3 auth)</strong> y pégala abajo.</div></div>
      </div>
      <input class="modal-input key-visible" id="key-inp" type="text" placeholder="tu api key v3…" value="${escHtml(cur)}">
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cerrar</button>
        <button class="btn-primary" onclick="saveKey()">Guardar</button>
      </div>
    </div>
    <div id="tab-github" class="modal-tab-content">
      <div class="key-steps">
        <div class="key-step"><span class="key-step-num">1</span><div class="key-step-body">Ve a <a href="https://github.com" target="_blank">github.com</a> e inicia sesión (o regístrate, es gratis).</div></div>
        <div class="key-step"><span class="key-step-num">2</span><div class="key-step-body">Pulsa <strong>+</strong> → <strong>New repository</strong>. Nombre: <code>movie-nes</code>. Visibilidad: <strong>Public</strong>. Pulsa <strong>Create repository</strong>.</div></div>
        <div class="key-step"><span class="key-step-num">3</span><div class="key-step-body">En el repo recién creado pulsa <strong>Add file → Upload files</strong>. Arrastra el archivo <code>index.html</code>. Pulsa <strong>Commit changes</strong>.</div></div>
        <div class="key-step"><span class="key-step-num">4</span><div class="key-step-body">Ve a <strong>Settings → Pages</strong>. En <em>Branch</em> selecciona <strong>main</strong> y carpeta <strong>/ (root)</strong>. Pulsa <strong>Save</strong>.</div></div>
        <div class="key-step"><span class="key-step-num">5</span><div class="key-step-body">Espera 1-2 min. Tu URL será: <code>https://tuusuario.github.io/movie-nes/</code></div></div>
        <div class="key-step"><span class="key-step-num">6</span><div class="key-step-body">Para actualizar en el futuro: en el repo, <strong>Add file → Upload files</strong> → arrastra el nuevo <code>index.html</code> → <strong>Commit changes</strong>. <em>No uses el editor de lápiz con archivos grandes.</em> Espera sobre 1 minuto para que se recargue el contenido.</div></div>
      </div>
    </div>`,'wide');
  setTimeout(()=>document.getElementById('key-inp')?.focus(),50);
}
function saveKey(){const v=document.getElementById('key-inp')?.value.trim();if(v){setKey(v);showToast('Key guardada ✓');closeModal();loadMovies(true);}else closeModal();}
function switchTab(btn,tabId){
  document.querySelectorAll('.modal-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.modal-tab-content').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(tabId)?.classList.add('active');
}

// ── MODAL HELPERS ──
function showModal(html,cls=''){document.getElementById('modal-container').innerHTML=`<div class="modal-overlay" onclick="overlayClose(event)"><div class="modal-box${cls?' '+cls:''}">${html}</div></div>`;}
function closeModal(){document.getElementById('modal-container').innerHTML='';}
function overlayClose(e){if(e.target.classList.contains('modal-overlay'))closeModal();}

// ── LOADING / EMPTY ──
function setLoading(on,text=''){const ls=document.getElementById('loading-screen');ls.style.display=on?'flex':'none';if(text)document.getElementById('loading-text').textContent=text;}
function setLoadingBar(pct){const el=document.getElementById('loading-bar');if(el)el.style.width=pct+'%';}
function showEmpty(msg=''){const el=document.getElementById('empty-state');el.classList.add('on');const m=document.getElementById('empty-msg');if(m&&msg)m.textContent=msg;}
function hideEmpty(){document.getElementById('empty-state').classList.remove('on');}

// ── UTILS ──
function escHtml(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showToast(msg,ms=2200){const t=document.createElement('div');t.className='toast-msg';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),400);},ms);}

// ── TIZEN ──
function detectTizen(){if(navigator.userAgent.includes('Tizen')||navigator.userAgent.includes('SmartTV'))document.body.classList.add('tizen-detected');}

// ── INIT ──
window.addEventListener('load',async()=>{
  detectTizen();
  updateDots();
  onZoomChange(108);
  renderFilterBar();
  adjustLayout();
  // Seed order from existing sets
  if(watchedOrder.length===0&&watchedSet.size>0){watchedOrder=[...watchedSet];saveWatched();}
  if(discardedOrder.length===0&&discardedSet.size>0){discardedOrder=[...discardedSet];saveDiscarded();}
  if(!getKey()){
    setLoading(false);showEmpty('Añade tu API Key de TMDB para empezar');
    showToast('Añade tu API Key de TMDB →',4000);
    setTimeout(()=>openKeyModal(),700);return;
  }
  await loadMovies(true);
});
</script>
